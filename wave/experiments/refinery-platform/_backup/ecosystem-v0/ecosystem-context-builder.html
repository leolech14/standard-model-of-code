<!-- ECOSYSTEM CONTEXT BUILDER — Interactive Pillar 3 Widget -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosystem Context Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: transparent; min-height: 100vh; overflow-x: hidden; color: #e2e8f0; }
        .terminal-font { font-family: 'JetBrains Mono', monospace; }
        .data-flow { stroke-dasharray: 4 8; animation: flow 1s linear infinite; }
        @keyframes flow { from { stroke-dashoffset: 12; } to { stroke-dashoffset: 0; } }
        .cloud-bg { position: absolute; top: -5%; left: 50%; transform: translateX(-50%); width: 120%; height: 60%; background: radial-gradient(ellipse at center, rgba(30,41,59,0.5) 0%, transparent 70%); z-index: 0; pointer-events: none; }
        .terminal-scroll::-webkit-scrollbar { width: 6px; }
        .terminal-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .terminal-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        .node-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .node-hover:hover { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2); }
    </style>
</head>
<body class="flex flex-col items-center justify-start pt-10 pb-20 text-slate-200 selection:bg-indigo-200">
    <div class="cloud-bg"></div>

    <!-- Main Ecosystem Area -->
    <div class="relative w-full max-w-4xl h-[500px] z-10" id="ecosystem-container">
        <svg class="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none" id="lines-container"></svg>
        <div id="nodes-container"></div>
        <div class="absolute left-1/2 top-[85%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center w-64">
            <div class="flex gap-1 mb-2" id="convergence-dots"></div>
            <h2 class="text-xl font-semibold tracking-tight text-slate-100">Ecosystem Cloudpoint</h2>
            <div class="text-sm text-slate-400 font-medium tracking-wide mb-2 flex items-center gap-2">
                <span id="total-tokens-display" class="terminal-font">0</span> tokens
                <span class="w-1 h-1 rounded-full bg-slate-400"></span>
                <span id="status-text">standby</span>
            </div>
            <div class="w-48 h-2 bg-slate-700 rounded-full overflow-hidden shadow-inner border border-slate-600/50">
                <div id="token-progress" class="h-full bg-gradient-to-r from-indigo-400 to-purple-500 w-0 transition-all duration-500 ease-out"></div>
            </div>
        </div>
    </div>

    <!-- Laptop UI -->
    <div class="mt-12 relative z-20 flex flex-col items-center">
        <svg class="w-32 h-24 pointer-events-none opacity-30" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d="M 20 0 C 20 50, 40 50, 40 100" fill="none" stroke="#64748b" stroke-width="1" />
            <path d="M 40 0 C 40 50, 45 50, 45 100" fill="none" stroke="#64748b" stroke-width="1" />
            <path d="M 60 0 C 60 50, 55 50, 55 100" fill="none" stroke="#64748b" stroke-width="1" />
            <path d="M 80 0 C 80 50, 60 50, 60 100" fill="none" stroke="#64748b" stroke-width="1" />
        </svg>

        <!-- Laptop Screen -->
        <div class="w-[340px] sm:w-[480px] h-[220px] sm:h-[300px] bg-slate-900 rounded-t-2xl border-[6px] border-slate-600 shadow-2xl relative overflow-hidden flex flex-col">
            <div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent pointer-events-none"></div>
            <div class="h-6 bg-slate-800 flex items-center px-3 gap-1.5 border-b border-slate-700/50">
                <div class="w-2.5 h-2.5 rounded-full bg-rose-500/80"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-amber-500/80"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-emerald-500/80"></div>
                <div class="ml-2 text-[10px] text-slate-400 terminal-font">bash - openclaw</div>
            </div>
            <div class="flex-1 p-4 terminal-font text-xs sm:text-sm text-emerald-400 overflow-y-auto terminal-scroll flex flex-col justify-end" id="terminal-content">
                <div class="opacity-50 mb-2">Initializing local environment...</div>
                <div><span class="text-emerald-300">$</span> claude code</div>
                <div id="terminal-logs" class="flex flex-col gap-1 mt-1"></div>
                <div class="mt-2 flex items-center gap-2">
                    <span class="text-emerald-300">$</span>
                    <span class="w-2 h-4 bg-emerald-400 animate-pulse"></span>
                </div>
            </div>
        </div>
        <div class="relative w-[400px] sm:w-[560px]">
            <div class="h-4 bg-slate-700 rounded-t-sm w-full mx-auto relative z-10 border-b border-slate-600 flex justify-center">
                <div class="w-16 h-1 bg-slate-600 rounded-b-md"></div>
            </div>
            <div class="h-3 bg-slate-700 rounded-b-xl w-[98%] mx-auto shadow-xl"></div>
        </div>
        <div class="mt-8 text-sm font-medium tracking-widest text-slate-500 uppercase">
            Local Dev &bull; Project_openclaw
        </div>
    </div>

    <script>
        const state = {
            nodes: [
                { id: "notion", label: "Notion", sub: "docs", icon: "📓", color: "text-slate-200 bg-slate-800/80 border-slate-600", activeColor: "ring-slate-400", tokens: 1200, x: 15, y: 15, active: false },
                { id: "chatgpt", label: "ChatGPT", sub: "research", icon: "💬", color: "text-emerald-200 bg-slate-800/80 border-emerald-700", activeColor: "ring-emerald-400", tokens: 850, x: 35, y: 10, active: false },
                { id: "google", label: "Google", sub: "cloud", icon: "🌐", color: "text-blue-200 bg-slate-800/80 border-blue-700", activeColor: "ring-blue-400", tokens: 2100, x: 65, y: 10, active: false },
                { id: "github", label: "GitHub", sub: "code", icon: "🐙", color: "text-gray-200 bg-slate-800/80 border-gray-600", activeColor: "ring-gray-400", tokens: 3400, x: 85, y: 15, active: false },
                { id: "anthropic", label: "Anthropic", sub: "LLMs", icon: "🤖", color: "text-amber-200 bg-slate-800/80 border-amber-700", activeColor: "ring-amber-400", tokens: 1500, x: 25, y: 30, active: false },
                { id: "supabase", label: "Supabase", sub: "data", icon: "⚡", color: "text-green-200 bg-slate-800/80 border-green-700", activeColor: "ring-green-400", tokens: 900, x: 50, y: 25, active: false },
                { id: "doppler", label: "Doppler", sub: "secrets", icon: "🔑", color: "text-yellow-200 bg-slate-800/80 border-yellow-700", activeColor: "ring-yellow-400", tokens: 150, x: 75, y: 30, active: false },
                { id: "openfinance", label: "Open Finance", sub: "data", icon: "📊", color: "text-indigo-200 bg-slate-800/80 border-indigo-700", activeColor: "ring-indigo-400", tokens: 600, x: 15, y: 45, active: false },
                { id: "cerebras", label: "Cerebras", sub: "inference", icon: "🧮", color: "text-rose-200 bg-slate-800/80 border-rose-700", activeColor: "ring-rose-400", tokens: 4500, x: 50, y: 45, active: false },
                { id: "n8n", label: "n8n", sub: "flows", icon: "🔄", color: "text-red-200 bg-slate-800/80 border-red-700", activeColor: "ring-red-400", tokens: 400, x: 85, y: 45, active: false }
            ],
            targetX: 50, targetY: 82, maxTokens: 15600
        };
        const DOM = {
            linesContainer: document.getElementById('lines-container'),
            nodesContainer: document.getElementById('nodes-container'),
            convergenceDots: document.getElementById('convergence-dots'),
            totalTokensDisplay: document.getElementById('total-tokens-display'),
            tokenProgress: document.getElementById('token-progress'),
            statusText: document.getElementById('status-text'),
            terminalLogs: document.getElementById('terminal-logs')
        };

        function init() { renderNodes(); renderLines(); updateUI(); }
        function toggleNode(id) { const node = state.nodes.find(n => n.id === id); if (node) { node.active = !node.active; updateUI(); } }
        function renderNodes() {
            DOM.nodesContainer.innerHTML = '';
            state.nodes.forEach(node => {
                const el = document.createElement('div');
                el.className = `absolute flex flex-col items-center justify-center w-20 h-20 sm:w-24 sm:h-24 rounded-2xl border shadow-sm cursor-pointer select-none node-hover backdrop-blur-sm ${node.color}`;
                el.style.left = `${node.x}%`; el.style.top = `${node.y}%`; el.style.transform = 'translate(-50%, -50%)';
                el.id = `node-${node.id}`;
                el.innerHTML = `<div class="text-2xl sm:text-3xl mb-1">${node.icon}</div><div class="text-[10px] sm:text-xs font-bold leading-tight text-center px-1">${node.label}</div><div class="text-[8px] sm:text-[10px] opacity-70 leading-tight">${node.sub}</div>`;
                el.addEventListener('click', () => toggleNode(node.id));
                DOM.nodesContainer.appendChild(el);
            });
        }
        function renderLines() {
            DOM.linesContainer.innerHTML = ''; DOM.convergenceDots.innerHTML = '';
            state.nodes.forEach(node => {
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const sX = node.x, sY = node.y + 5, eX = state.targetX, eY = state.targetY;
                const d = `M ${sX} ${sY} C ${sX} ${sY + (eY - sY) / 2}, ${eX} ${sY + (eY - sY) / 2}, ${eX} ${eY}`;
                path.setAttribute('d', d); path.setAttribute('fill', 'none');
                path.setAttribute('stroke', '#334155'); path.setAttribute('stroke-width', '0.4');
                path.id = `line-${node.id}`;
                DOM.linesContainer.appendChild(path);
                const dot = document.createElement('div');
                dot.className = 'w-1.5 h-1.5 rounded-full bg-slate-600 transition-colors duration-300';
                dot.id = `dot-${node.id}`;
                DOM.convergenceDots.appendChild(dot);
            });
        }

        function updateUI() {
            let activeTokens = 0; let activeNodes = [];
            state.nodes.forEach(node => {
                const nodeEl = document.getElementById(`node-${node.id}`);
                const lineEl = document.getElementById(`line-${node.id}`);
                const dotEl = document.getElementById(`dot-${node.id}`);
                if (node.active) {
                    activeTokens += node.tokens; activeNodes.push(node);
                    nodeEl.classList.add('ring-2', 'ring-offset-2', node.activeColor); nodeEl.classList.remove('opacity-70');
                    lineEl.setAttribute('stroke', '#818cf8'); lineEl.setAttribute('stroke-width', '0.8'); lineEl.classList.add('data-flow');
                    dotEl.classList.remove('bg-slate-600'); dotEl.classList.add('bg-indigo-500', 'shadow-[0_0_8px_rgba(99,102,241,0.8)]');
                } else {
                    nodeEl.classList.remove('ring-2', 'ring-offset-2', node.activeColor); nodeEl.classList.add('opacity-70');
                    lineEl.setAttribute('stroke', '#1e293b'); lineEl.setAttribute('stroke-width', '0.4'); lineEl.classList.remove('data-flow');
                    dotEl.classList.add('bg-slate-600'); dotEl.classList.remove('bg-indigo-500', 'shadow-[0_0_8px_rgba(99,102,241,0.8)]');
                }
            });
            DOM.totalTokensDisplay.innerText = activeTokens.toLocaleString();
            DOM.tokenProgress.style.width = `${(activeTokens / state.maxTokens) * 100}%`;
            if (activeTokens > 0) { DOM.statusText.innerText = 'always-on'; DOM.statusText.classList.add('text-indigo-600'); }
            else { DOM.statusText.innerText = 'standby'; DOM.statusText.classList.remove('text-indigo-600'); }
            updateTerminal(activeNodes, activeTokens);
        }
        function updateTerminal(activeNodes, totalTokens) {
            DOM.terminalLogs.innerHTML = '';
            if (activeNodes.length === 0) { DOM.terminalLogs.innerHTML = `<div class="text-slate-500 italic">Waiting for ecosystem connections...</div>`; return; }
            activeNodes.forEach(node => {
                const log = document.createElement('div');
                log.innerHTML = `<span class="text-slate-400">+</span> ecosystem <span class="text-blue-300">${node.id}</span> loaded <span class="text-slate-500 text-[10px]">(${node.tokens}t)</span>`;
                DOM.terminalLogs.appendChild(log);
            });
            const s = document.createElement('div'); s.className = 'mt-2 text-indigo-300 font-bold';
            s.innerHTML = `<span class="text-slate-400">></span> CONTEXT: ${totalTokens.toLocaleString()} tokens active`;
            DOM.terminalLogs.appendChild(s);
            document.getElementById('terminal-content').scrollTop = 99999;
        }
        init();
    </script>
</body>
</html>
