# DocsIntel Provider Registry
# Level: L6 (PACKAGE)
# Purpose: Track available documentation providers and their access methods

version: "1.0.0"
updated: "2026-01-29"

# =============================================================================
# LAYER 1: PRE-INDEXED (Community-maintained MCP servers)
# =============================================================================
pre_indexed:

  context7:
    name: "Context7 MCP"
    maintainer: "Upstash"
    install: "npx @upstash/context7-mcp"
    mcp_config:
      command: "npx"
      args: ["-y", "@upstash/context7-mcp"]
    providers:
      - react
      - next.js
      - mongodb
      - supabase
      - fastapi
      - vue
      - angular
      - express
      - prisma
      - tailwind
      # ... 100+ more
    usage: 'Include "use context7" in prompt'
    status: installed

  anthropic_docs:
    name: "Anthropic Docs MCP"
    maintainer: "julianoczkowski"
    install: "npm install -g @julianoczkowski/anthropic-docs-mcp-ts"
    mcp_config:
      command: "anthropic-docs-mcp"
      args: ["--transport", "stdio"]
    providers:
      - anthropic
      - claude
      - mcp
    tools:
      - search_anthropic_docs
      - fetch_doc
    status: installed
    priority: high

  aws_mcp:
    name: "AWS MCP Server"
    maintainer: "AWS"
    install: "AWS Marketplace"
    providers:
      - aws_ec2
      - aws_s3
      - aws_lambda
      - aws_bedrock
      # ... all AWS services
    status: available

  aws_knowledge:
    name: "AWS Knowledge MCP"
    maintainer: "AWS"
    install: "Public, free"
    providers:
      - aws_docs
      - aws_blogs
      - aws_best_practices
    status: available

# =============================================================================
# LAYER 2: SELF-INDEXED (On-demand via docs-mcp-server)
# =============================================================================
self_indexed:

  engine:
    name: "docs-mcp-server"
    maintainer: "arabold"
    github: "https://github.com/arabold/docs-mcp-server"
    mcp_config:
      command: "npx"
      args: ["mcp-remote", "https://gitmcp.io/arabold/docs-mcp-server"]
    status: installed
    web_ui: "http://localhost:6280"

  # Providers to index (queue these via docs-mcp-server)
  providers_to_index:

    gcp:
      name: "Google Cloud Platform"
      urls:
        - "https://cloud.google.com/docs"
        - "https://cloud.google.com/compute/docs"
        - "https://cloud.google.com/iam/docs"
        - "https://cloud.google.com/run/docs"
      priority: high
      status: not_indexed

    stripe:
      name: "Stripe"
      urls:
        - "https://stripe.com/docs"
        - "https://stripe.com/docs/api"
      priority: low
      status: not_indexed

    vercel:
      name: "Vercel"
      urls:
        - "https://vercel.com/docs"
      priority: medium
      status: not_indexed

    cloudflare:
      name: "Cloudflare"
      urls:
        - "https://developers.cloudflare.com/docs"
      priority: medium
      status: not_indexed

    huggingface:
      name: "Hugging Face"
      urls:
        - "https://huggingface.co/docs"
      priority: high
      status: not_indexed

# =============================================================================
# LAYER 3: CUSTOM RAG (Future - requires vector DB + embeddings)
# =============================================================================
custom_rag:
  status: not_built
  target_level: L7
  components_needed:
    - vector_db: "qdrant | pinecone | pgvector"
    - embeddings: "openai | voyage | local"
    - mcp_server: "fastmcp | custom"
  use_cases:
    - "Cross-provider comparison queries"
    - "Proprietary documentation"
    - "Learned patterns and preferences"

# =============================================================================
# CANONICAL STACK (Leonardo's priority providers)
# =============================================================================
canonical_stack:

  tier_1_critical:
    - anthropic  # AI provider (current issue)
    - gcp        # Cloud infrastructure
    - supabase   # Database

  tier_2_important:
    - aws        # Cloud alternative
    - vercel     # Deployment
    - huggingface # AI models

  tier_3_useful:
    - stripe     # Payments
    - cloudflare # Edge/CDN
    - github     # Version control

# =============================================================================
# METADATA
# =============================================================================
metadata:
  position: OBSERVER.Ingestor
  l_scale: null  # Orthogonal - L-scale is Codome-only
  realm: OBSERVER
  subsystem: Ingestor  # Miller's taxonomy
  location: wave/tools/docsintel/
  rationale: |
    The L-scale (L-3 to L12) applies exclusively to Codome (code entities with
    tree-sitter kinds). DocsIntel operates on external Contextome (provider
    documentation), making it orthogonal to the level hierarchy. It belongs
    in the OBSERVER realm as a knowledge acquisition subsystem.
  see_also: POSITIONING.md
