conflicts:
- code_zoo_says: Functions are pure and have no side effects
  resolution: SWEBOK's definition of functional requirements is more comprehensive
    and takes into account the system's constraints, whereas CODE_ZOO's definition
    of functions is more focused on their purity and lack of side effects. CODE_ZOO's
    definition can be enhanced to include the concept of functional requirements as
    described in SWEBOK.
  swebok_says: Functional requirements are those that would still need to be stated
    even if a computer with infinite speed, unlimited memory, zero cost, no failures,
    etc., existed
- code_zoo_says: Design reviews are typically conducted at the end of the design phase
  resolution: SWEBOK's definition is more accurate, as design reviews can indeed be
    conducted at any stage of design, not just at the end.
  swebok_says: Design reviews can be undertaken at any stage of design
- code_zoo_says: The LOCUS concept defines the complete multi-dimensional coordinate
    that locates an atom in theory space, but does not explicitly mention measurement
    processes.
  resolution: SWEBOK's emphasis on measurement processes is a valuable addition to
    CODE_ZOO, and could be incorporated as a specific type of Utility or Validator
    atom.
  swebok_says: The measurement process should be enacted during the software project
    to ensure that relevant and useful data is collected.
- code_zoo_says: Validator role is about checking if something meets certain criteria,
    but it's not explicitly about ensuring the product is built correctly
  resolution: CODE_ZOO's Validator role can be seen as a more general concept that
    encompasses both verification and validation, but it might be beneficial to add
    a specific subtype for 'Verification' to align with SWEBOK's definition.
  swebok_says: Verification is about ensuring the product is built correctly
- code_zoo_says: No direct equivalent for certification in CODE_ZOO.
  resolution: CODE_ZOO should consider adding a concept for certification to better
    align with industry practices and standards.
  swebok_says: Certification is a process of verifying an individual's expertise.
- code_zoo_says: No direct equivalent for intellectual property law in CODE_ZOO.
  resolution: CODE_ZOO should consider adding a concept for intellectual property
    law to provide a more comprehensive understanding of software engineering.
  swebok_says: Intellectual property law is a critical aspect of software engineering.
- code_zoo_says: Normalization is not explicitly mentioned in CODE_ZOO
  resolution: SWEBOK's emphasis on normalization highlights its importance in database
    design, which could be incorporated into CODE_ZOO as a best practice or guideline
    for LOG.FNC.Mapper atoms.
  swebok_says: Normalization is essential for database design
- code_zoo_says: An entity is an aggregate of values, but not necessarily a collection
    of objects
  resolution: The CODE_ZOO definition is more general, while the SWEBOK definition
    is more specific. The CODE_ZOO definition can be enhanced to include the concept
    of a set as a specific type of entity.
  swebok_says: A set is a collection of objects called elements
- code_zoo_says: A group is not explicitly defined in CODE_ZOO, but it can be represented
    by a combination of atoms and roles
  resolution: SWEBOK provides a more formal and mathematical definition of a group,
    while CODE_ZOO provides a more practical and implementation-focused representation.
    Both perspectives are valid and can be used together to provide a more comprehensive
    understanding of the concept.
  swebok_says: A group is a monoid with inverses
- code_zoo_says: Software reliability is not explicitly mentioned in the CODE_ZOO
    taxonomy.
  resolution: The SWEBOK definition is more comprehensive, and CODE_ZOO should consider
    adding software reliability as a separate concept or dimension to the LOCUS formula.
  swebok_says: Software reliability is a critical aspect of software quality.
- code_zoo_says: Cybersecurity is not explicitly mentioned in the CODE_ZOO taxonomy.
  resolution: The SWEBOK definition is more comprehensive, and CODE_ZOO should consider
    adding cybersecurity as a separate concept or dimension to the LOCUS formula.
  swebok_says: Cybersecurity is a critical aspect of software development and maintenance.
