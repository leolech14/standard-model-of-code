top_enhancements:
- code_zoo_concept: LOG.FNC.Function
  enhancement: Add a 'derived' attribute to functions to indicate if they are derived
    from other requirements
  source: SWEBOK section 1.10, Derived Requirements
- code_zoo_concept: ORG.SVC.Service
  enhancement: Introduce a 'nonfunctional' attribute to services to distinguish between
    functional and nonfunctional requirements
  source: SWEBOK section 1.9, System Requirements and Software Requirements
- code_zoo_concept: ORG.MOD.Module
  enhancement: Add a 'scope' attribute to modules to define their boundaries and relationships
    with other modules
  source: SWEBOK section 1.10, Derived Requirements
- code_zoo_concept: ORG.SVC.Service
