# Documentation Map (The Holographic Index)
# Maps documentation files to the semantic concepts they cover.
# Used by the Socratic Layer to detect documentation drift.

# =============================================================================
# DOCUMENTATION → CONCEPTS
# =============================================================================
documentation:
  # Core Theory Documentation
  "wave/docs/theory/THEORY.md":
    covers:
      - theory.Atom
      - theory.Dimension
      - theory.Ring
    validates_against:
      - "particle/schema/particle.schema.json"
      - "particle/src/core/atom_registry.py"
    critical: true  # Changes here require full validation

  # Data Logistics Theory
  "wave/docs/theory/THEORY_DATA_LOGISTICS.md":
    covers:
      - logistics.Parcel
      - logistics.Waybill
      - logistics.Ritual
    validates_against:
      - "wave/tools/refinery/pipeline.py"
      - "wave/tools/refinery/corpus_inventory.py"
      - "wave/tools/ai/aci/refinery.py"

  # Tool Documentation
  "wave/docs/TOOL.md":
    covers:
      - pipeline.Stage
      - pipeline.Extractor
      - architecture.Tool
    validates_against:
      - "particle/src/core/pipeline/base_stage.py"
      - "particle/src/core/*_extractor*.py"
      - "wave/tools/ai/analyze.py"

  # AI User Guide
  "wave/docs/AI_USER_GUIDE.md":
    covers:
      - architecture.Tool
      - holographic_socratic_layer
    validates_against:
      - "wave/tools/ai/analyze.py"
      - "wave/config/semantic_models.yaml"

  # Holographic-Socratic Layer
  "wave/docs/HOLOGRAPHIC_SOCRATIC_LAYER.md":
    covers:
      - holographic_socratic_layer
      - antimatter_laws
    validates_against:
      - "wave/tools/ai/analyze.py"
      - "wave/config/semantic_models.yaml"
      - "../PROJECT_sentinel/agents/com.elements.socratic-audit.plist"

# =============================================================================
# VALIDATION RULES
# =============================================================================
validation:
  # How often each doc type should be validated
  critical_docs:
    interval: "on_change"
    trigger: "WatchPaths"

  standard_docs:
    interval: "daily"
    trigger: "StartCalendarInterval"

  # Evidence requirements
  evidence:
    minimum_anchors: 1
    require_line_numbers: true
