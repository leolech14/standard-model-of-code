# Refinery Parametric Configuration (Layer 2)
# Generated by Refinery Dashboard "Slicer"

pipeline:
  # The Attention Mechanism Signal
  query: "What are the core constituents of the Standard Model of Code?"

  # Processing Limits
  max_files: 50

  # Performance / Cost Controls
  use_cache: true
  batch_mode: true

refinery:
  # Context Depth: shallow (docs), medium (structural), deep (full AST)
  context_depth: "deep"

  # Attention Mode: laminar (high purity), turbulent (high discovery)
  attention_mode: "laminar"

  # Thresholds (Overrides for Laminar/Turbulent defaults)
  threshold_high: 0.6
  threshold_low: 0.3

output:
  publish_to_neo4j: true
  publish_to_gcs: true
  generate_report: true
