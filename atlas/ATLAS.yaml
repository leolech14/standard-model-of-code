# =====================
# AGENTS
# =====================

agents:

  - id: AGT-001
    kind: agent
    name: claude-web
    display_name: Claude (Web/App)
    purpose: Primary conversational AI for research, architecture, writing, and strategic reasoning.
    owner: leo
    stage: P2
    status: active
    type: llm_conversational
    runtime:
      provider: anthropic
      model: claude-opus-4-6
      context_window: 1000000
      cost_tier: very_high
    interface:
      primary: chat
      channels: [claude.ai, claude-mobile-app]
      mcp_servers: [notion, google-calendar, gmail, huggingface, figma]
    capabilities:
      strengths: [multi_step_reasoning, architecture_design, research, creative_writing, analysis, planning, document_production]
      limitations: [no_local_code_execution, no_file_system_access, no_ssh, no_vps_access]
    governance:
      delegation:
        can_read: [architecture, schemas, documentation, research, web]
        can_write: [documents, schemas, analysis, artifacts]
        can_execute: [web_search, drive_search, notion_query, file_creation]
        cannot: [deploy, modify_infrastructure, access_production_data, execute_code_on_servers]
      escalation:
        triggers: [needs_code_execution, needs_vps_access, needs_deployment]
        target: agent:AGT-002
        method: artifact_handoff
    agent:
      explanation: "Claude on claude.ai — the primary AI for strategic thinking, architecture, research, and documents. Has web search, Google Drive, Notion, Gmail, Desktop Commander for filesystem. Cannot execute code on local machines or access the VPS."
      context_priority: 0.95
      related:
        - ref: agent:AGT-002
          why: Claude Code is the execution counterpart — what this agent designs, AGT-002 builds.
          when: always

  - id: AGT-002
    kind: agent
    name: claude-code
    display_name: Claude Code (Rainmaker)
    purpose: Primary agentic coding and infrastructure agent — builds, deploys, and manages the ecosystem.
    owner: leo
    stage: P2
    status: active
    type: llm_agentic
    runtime:
      provider: anthropic
      model: claude-opus-4-6
      context_window: 1000000
      cost_tier: very_high
    interface:
      primary: cli
      channels: [claude-code-cli]
      mcp_servers: [cerebras-code, cerebras-intelligence, doppler, github, notion, desktop-commander, filesystem, browser, mobile-mcp, memory, sequential-thinking, context7]
    capabilities:
      components_accessible: [CMP-001, CMP-002, CMP-003, CMP-010]
      connections_usable: [CON-001, CON-002, CON-003, CON-004, CON-005, CON-006]
      strengths: [code_generation, debugging, tool_orchestration, infrastructure_management, file_operations, multi_step_reasoning, data_transformation]
      limitations: [no_web_browsing, cost_high_per_session, context_fills_on_large_repos]
    governance:
      delegation:
        can_read: [code, configs, secrets_names, logs, documentation, schemas]
        can_write: [code, configs, documentation, schemas, scripts]
        can_execute: [shell_commands, deploy_staging, run_tests, install_packages, git_operations, mcp_tool_calls]
        cannot: [deploy_production_without_approval, delete_production_data, modify_billing, share_credentials_in_output]
      escalation:
        triggers: [production_deployment, data_deletion, cost_above_threshold, unfamiliar_infrastructure]
        target: owner:leo
        method: pause_and_ask
      audit:
        logs_decisions: true
        logs_actions: true
        log_destination: "~/.claude/projects/*/MEMORY.md"
    memory:
      type: persistent_file
      location: "~/.claude/MEMORY.md + project MEMORY.md files"
    agent:
      explanation: "Claude Code (Rainmaker) — the CLI agentic agent. Writes code, manages files, runs shell commands, orchestrates the ecosystem. Direct access to filesystem, SSH, Doppler, all MCP servers. The primary executor."
      context_priority: 0.95
      related:
        - ref: agent:AGT-001
          why: Claude Web is the strategic counterpart — what AGT-001 designs, this agent builds.
          when: always
        - ref: connection:CON-001
          why: Primary AI inference for code generation tasks.
          when: if_generating_code
        - ref: connection:CON-005
          why: All credentials flow through Doppler. If auth fails, check this first.
          when: if_debugging_auth

  - id: AGT-003
    kind: agent
    name: n8n-orchestrator
    display_name: n8n Workflow Engine
    purpose: Automated workflow orchestration — syncs Notion, processes webhooks, runs scheduled data pipelines.
    owner: leo
    stage: P2
    status: active
    type: workflow_runner
    runtime:
      provider: self_hosted
      model: null
      cost_tier: low
    interface:
      primary: webhook
      channels: [vps:5678]
    capabilities:
      strengths: [workflow_orchestration, scheduled_automation, webhook_processing, data_sync]
      limitations: [no_reasoning, no_code_generation, deterministic_only, requires_predefined_flows]
    governance:
      cannot: [modify_workflows_autonomously, access_financial_data, send_external_emails]
      escalation:
        triggers: [workflow_failure_3x, unknown_webhook_source, rate_limit_hit]
        target: owner:leo
        method: notify_and_continue
    agent:
      explanation: "n8n on the VPS. Handles Notion sync, webhook processing, scheduled pipelines. Deterministic flows with occasional AI agent nodes. If sync is broken, check this agent and its connections."
      context_priority: 0.6
      related:
        - ref: connection:CON-010
          why: n8n triggers Notion sync workflows through this connection.
          when: if_debugging_sync

  - id: AGT-004
    kind: agent
    name: chatgpt-agents
    display_name: ChatGPT Agents
    purpose: Parallel reasoning, second opinions, adversarial auditing, and extended research via OpenAI models.
    owner: leo
    stage: P1
    status: active
    type: llm_conversational
    runtime:
      provider: openai
      model: gpt-4.1
      context_window: 1000000
      cost_tier: high
    interface:
      primary: chat
      channels: [chatgpt.com]
    capabilities:
      strengths: [research, adversarial_thinking, parallel_reasoning, long_context]
      limitations: [no_ecosystem_access, no_file_system, no_code_execution, separate_context_per_session]
    governance:
      cannot: [access_ecosystem_directly, execute_commands, modify_files]
    agent:
      explanation: "ChatGPT agents for second opinions, adversarial audits, and parallel research. No direct ecosystem access — work transferred via copy/paste or file upload. Valuable for stress-testing architecture decisions."
      context_priority: 0.4


# =====================
# COMPONENTS
# =====================

components:

  - id: CMP-001
    kind: component
    name: cerebras-rapid-intel
    display_name: Cerebras Rapid Intelligence
    purpose: Fast AI-powered research and analysis using Cerebras inference for speed-critical tasks.
    owner: leo
    application: wave-ai-tools
    stage: P2
    status: active
    category: analysis
    delivery: cli_tool
    invoke:
      method: "python wave/tools/ai/cerebras_rapid_intel.py"
      environment: [doppler:ai-tools/prd/CEREBRAS_API_KEY]
    inputs:
      - name: query
        type: string
        required: true
        description: Research question or analysis prompt.
    outputs:
      - name: analysis
        type: json
        description: Structured analysis with findings and confidence scores.
    requires_connections: [CON-001]
    feeds_into: [CMP-002]
    agent:
      explanation: "Fast intelligence tool on Cerebras. Takes a research query, returns structured analysis at high speed. Use when speed matters more than depth."
      context_priority: 0.6

  - id: CMP-002
    kind: component
    name: collider
    display_name: Collider Code Analyzer
    purpose: Deep code analysis using algebraic topology — extracts structural patterns and architectural health.
    owner: leo
    application: wave-ai-tools
    stage: P3
    status: active
    category: analysis
    delivery: cli_tool
    invoke:
      method: "./collider full {input_path} --output {output_dir}"
      environment: []
    inputs:
      - name: target_path
        type: string
        required: true
        description: Path to the codebase to analyze.
    outputs:
      - name: analysis_report
        type: file:json
        description: Full structural analysis with Betti numbers, incoherence scores, particle decomposition.
      - name: brain_download
        type: file:md
        description: Human/LLM-readable summary of findings.
    requires_connections: []
    feeds_into: [CMP-003]
    fed_by: [CMP-001]
    agent:
      explanation: "The Collider — code analysis engine based on SMoC. Applies algebraic topology (Betti numbers), 16-level holarchy, and 5-dimensional incoherence decomposition. Produces Brain Downloads for LLM consumption."
      context_priority: 0.7

  - id: CMP-003
    kind: component
    name: briefing-generator
    display_name: Briefing Generator
    purpose: Compresses Collider analysis output into dense, actionable briefings for AI agents and humans.
    owner: leo
    application: wave-ai-tools
    stage: P2
    status: active
    category: transformation
    delivery: cli_tool
    invoke:
      method: "python wave/tools/collider/briefing.py"
    inputs:
      - name: collider_output
        type: file:json
        required: true
    outputs:
      - name: briefing
        type: file:md
    fed_by: [CMP-002]
    agent:
      explanation: "Takes raw Collider output and compresses it into actionable briefings. The 'so what' layer on top of deep analysis."
      context_priority: 0.5

  - id: CMP-010
    kind: component
    name: notion-sync
    display_name: Notion Database Sync
    purpose: Automated synchronization of Notion databases (Tasks, Events, Runs to TimeView) via n8n.
    owner: leo
    application: ecosystem-platform
    stage: P2
    status: active
    category: orchestration
    delivery: scheduled_job
    invoke:
      method: webhook:n8n/notion-sync
      environment: [doppler:ai-tools/prd/NOTION_API_KEY]
    requires_connections: [CON-010]
    agent:
      explanation: "Notion database sync running on n8n. Keeps Tasks, Events, and Runs in sync with TimeView. If TimeView shows stale data, check this component and AGT-003."
      context_priority: 0.5

  - id: CMP-052
    kind: component
    name: ai-analyze
    display_name: AI Analysis Tool
    purpose: Smart-routed AI queries with mode selection (standard, forensic, architect) via Gemini.
    owner: leo
    application: wave-ai-tools
    stage: P2
    status: active
    category: analysis
    delivery: cli_tool
    invoke:
      method: "python wave/tools/ai/analyze.py {query} --mode {mode}"
      environment: [doppler:ai-tools/prd/GEMINI_API_KEY]
    inputs:
      - name: query
        type: string
        required: true
      - name: mode
        type: enum
        values: [standard, forensic, architect]
    outputs:
      - name: analysis_result
        type: text:md
    agent:
      explanation: "AI analysis tool with smart routing. Modes: standard (general), forensic (deep investigation), architect (structural reasoning). Uses Gemini."
      context_priority: 0.5

  - id: CMP-056
    kind: component
    name: cerebras-spiral-intel
    display_name: Cerebras Spiral Intelligence
    purpose: Multi-pass iterative codebase understanding — spirals upward in confidence across 5 passes.
    owner: leo
    application: wave-ai-tools
    stage: P2
    status: active
    category: analysis
    delivery: cli_tool
    invoke:
      method: "python wave/tools/ai/cerebras_spiral_intel.py spiral --parallel -w 20"
      environment: [doppler:ai-tools/prd/CEREBRAS_API_KEY]
    requires_connections: [CON-001]
    feeds_into: [CMP-002]
    agent:
      explanation: "Spiral Intelligence — multi-pass codebase understanding using Cerebras (3000 t/s). P1 surface scan → P2 gap filling → P3 dependency resolution → P4 subsystem synthesis → P5 unified model. 5,455 files analyzed in 5.4 minutes."
      context_priority: 0.5

