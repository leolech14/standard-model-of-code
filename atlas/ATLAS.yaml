#
# 1. Read this file at session start. It IS the ecosystem context.
#
# 2. To answer "what connects to X?" — search connections by target.
#
# 3. To answer "what breaks if X goes down?" — find connections to X,
#    read blast_radius, follow feeds_into chains in components.
#
# 4. To answer "can agent X do Y?" — read agent's governance.cannot.
#    If Y is listed, the answer is no.
#
# 5. To answer "what does component X need?" — read requires_connections,
#    then load those connections for transport, auth, and health.
#
# 6. To answer "is connection X healthy?" — read health block.
#    If verification.command exists, offer to run it.
#
# 7. When something fails, trace the dependency chain:
#    symptom → component → requires_connections → connection health
#    → if auth failure → check CON-005 (Doppler) first
#
# 8. context_priority guides what to pay attention to:
