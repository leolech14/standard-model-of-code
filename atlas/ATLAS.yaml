# ============================================================================
# ATLAS.yaml — The Ecosystem on One File
# Load this FIRST. Everything else follows.
#
# FIVE NODE TYPES (closed macro):
#   component  — software that transforms (passive, does not exercise discretionary judgment)
#   agent      — software with judgment (active, nondeterministic, governed)
#   resource   — governed infrastructure (databases, secrets, queues, buckets)
#   external   — providers outside the ecosystem boundary
#   connection — first-class data flow edges between any two nodes
#
# NINE CANONICAL RELATIONSHIPS (closed macro):
#   depends_on | integrates | orchestrates | replicates | delegates |
#   publishes | authenticates_via | observes | mediates
#
#   Qualifiers are open leaf: relationship.qualifier: x_lbl.scrape_metrics
#
# GRAPH:
#   Graph = (Components ∪ Agents ∪ Resources ∪ Externals, Connections)
#   Every ecosystem question is a graph traversal on this file.
#
# RULES:
#   Only present fields exist. No nulls. No placeholders.
#   Stage is a ratchet. P0 = exists. P5 = revenue depends on it.
#   Agents load this file at session start. It IS the ecosystem context.
# ============================================================================


# =====================
# EXTERNAL PROVIDERS
# =====================

externals:

  - id: EXT-001
    name: cerebras
    display_name: Cerebras
    domain: ai_provider
    base_url: https://api.cerebras.ai/v1
    docs_url: https://docs.cerebras.ai
    notes: Fastest inference. Primary for code gen and rapid intel.

  - id: EXT-002
    name: anthropic
    display_name: Anthropic
    domain: ai_provider
    base_url: https://api.anthropic.com/v1
    status_page: https://status.anthropic.com
    docs_url: https://docs.anthropic.com
    notes: Primary reasoning provider. Powers Claude Web and Claude Code. Most expensive per token.

  - id: EXT-003
    name: doppler
    display_name: Doppler
    domain: dev_tools
    base_url: https://api.doppler.com/v3
    status_page: https://status.doppler.com
    docs_url: https://docs.doppler.com
    notes: Bootstrap dependency. The ONLY hardcoded credential is Doppler's own config token.

  - id: EXT-004
    name: notion
    display_name: Notion
    domain: productivity
    base_url: https://api.notion.com/v1
    docs_url: https://developers.notion.com
    notes: Task management, knowledge base, database sync via n8n. Triple-connected (plugin + 2 MCP connectors).

  - id: EXT-005
    name: github
    display_name: GitHub
    domain: dev_tools
    base_url: https://api.github.com
    status_page: https://www.githubstatus.com
    docs_url: https://docs.github.com
    notes: Source control, CI/CD, MCP server for agentic git operations.

  - id: EXT-006
    name: telegram
    display_name: Telegram
    domain: social_comms
    base_url: https://api.telegram.org
    docs_url: https://core.telegram.org/bots/api
    notes: Bot API for notifications and automation triggers.

  - id: EXT-007
    name: openai
    display_name: OpenAI
    domain: ai_provider
    base_url: https://api.openai.com/v1
    docs_url: https://platform.openai.com/docs
    notes: Powers ChatGPT agents. GPT-4.1 and o-series.

  - id: EXT-008
    name: google-ai
    display_name: Google AI
    domain: ai_provider
    base_url: https://generativelanguage.googleapis.com/v1
    docs_url: https://ai.google.dev/docs
    notes: Gemini models. Used via AI Studio and Vertex. Also powers embeddings for LanceDB memory.

  - id: EXT-009
    name: elevenlabs
    display_name: ElevenLabs
    domain: media_creative
    base_url: https://api.elevenlabs.io/v1
    docs_url: https://docs.elevenlabs.io
    notes: Voice synthesis for WhatsApp Rainmaker voice pipeline. Fragile dependency. MCP server configured.

  - id: EXT-010
    name: replicate
    display_name: Replicate
    domain: ai_provider
    base_url: https://api.replicate.com/v1
    docs_url: https://replicate.com/docs
    notes: Model hosting. Image/video generation tasks.

  - id: EXT-011
    name: hostinger
    display_name: Hostinger
    domain: cloud_infra
    notes: VPS hosting provider. Hosts the production ecosystem (OpenClaw).

  - id: EXT-012
    name: huggingface
    display_name: Hugging Face
    domain: ai_provider
    base_url: https://huggingface.co
    docs_url: https://huggingface.co/docs
    notes: Model hub, Spaces, datasets. MCP server connected.

  - id: EXT-013
    name: perplexity
    display_name: Perplexity
    domain: ai_provider
    base_url: https://api.perplexity.ai
    docs_url: https://docs.perplexity.ai
    notes: Web research with citations. Models sonar, sonar-pro, sonar-reasoning, sonar-deep-research. Quota-sensitive.

  - id: EXT-014
    name: meta-cloud
    display_name: Meta WhatsApp Cloud API
    domain: social_comms
    base_url: https://graph.facebook.com
    docs_url: https://developers.facebook.com/docs/whatsapp/cloud-api
