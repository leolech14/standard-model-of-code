# │   ├── CONNECTIONS_REGISTRY.schema.yaml ← Connection schema definition
# │   ├── AGENTS_REGISTRY.schema.yaml   ← Agent schema definition
# │   └── ECOSYSTEM_GRAPH.yaml          ← THIS FILE. Master specification.
# │
# ├── registries/                        ← LIVE DATA (actual ecosystem state)
# │   ├── components.yaml               ← All component entries
# │   ├── connections.yaml              ← All connection entries
# │   ├── agents.yaml                   ← All agent entries
# │   └── external-providers.yaml       ← External provider index
# │
# └── validators/                        ← Validation rules and scanner specs
#     ├── validate.ts                    ← Schema validation + cross-reference checks
#     └── scanner.ts                     ← Reality vs registry drift detection


# === VALIDATION RULES ===
#
# Cross-registry integrity constraints:
#
# 1. REFERENTIAL INTEGRITY
#    Every ref in any registry must resolve to an existing entity.
#    component:CMP-042 must exist in components.yaml.
#    connection:CON-007 must exist in connections.yaml.
#    agent:AGT-003 must exist in agents.yaml.
#    external:cerebras must exist in external-providers.yaml.
#    doppler:{project}/{config}/{secret} must exist in Doppler.
#
# 2. BIDIRECTIONAL CONSISTENCY
#    If component CMP-042 lists requires_connections: [CON-007],
#    then CON-007 must have source or target referencing CMP-042.
#    If agent AGT-003 lists connections_usable: [CON-007],
#    then CON-007 must be accessible to AGT-003.
#
# 3. STAGE GATE COHERENCE
#    If product X is at stage P4:
#      All components of X must have stage ≤ P4 or be explicitly deferred.
#      All connections with stage_required ≤ P4 must have status ≠ broken.
#      All agents serving X must have governance appropriate to P4 requirements.
#
# 4. PERMISSION CONSISTENCY
#    If agent AGT-003 lists component:CMP-042 in features_accessible,
#    then CMP-042's requires_connections must be a subset of AGT-003's connections_usable.
#    An agent cannot access a component without access to its dependencies.
#
# 5. CREDENTIAL COVERAGE
#    Every connection with auth.method ≠ none must have at least one credential_ref.
#    Every credential_ref must resolve to a live Doppler secret.
#    Every connection with data_sensitivity ≥ confidential must have auth.method ≠ none.
#
# 6. HEALTH HONESTY
#    Connections with status = active must have last_verified within 30 days.
#    Connections with last_verified = null must have status = unknown, not active.
#    Agents with status = active must have at least one reachable connection.
#
# 7. NO ORPHANS
#    Every component must be accessible by at least one agent.
#    Every connection must be referenced by at least one component or agent.
#    Every agent must have at least one feature_accessible.
#    Orphaned entities are dead weight — flag for review or removal.
