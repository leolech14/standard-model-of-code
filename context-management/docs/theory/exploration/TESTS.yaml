      c_level: C5
      m_level: M₀
      notes: Still code, just machine-written

  # Vendor/third-party
  - id: edge-02
    path: "**/node_modules/**"
    type: Vendor code
    expected_config_a:
      c_level: varies
      m_level: M₀
      notes: External code, may exclude from analysis

  # Tests
  - id: edge-03
    path: "**/test_*.py"
    type: Test module
    expected_config_a:
      c_level: C5
      m_level: M₀
      about_c: describes other code (tested module)
      notes: Tests are code that describes behavior of other code

  # Binaries
  - id: edge-04
    path: "**/*.wasm"
    type: WebAssembly binary
    expected_config_a:
      c_level: C5
      m_level: M₀
      notes: Compiled code, lower visibility but still code

