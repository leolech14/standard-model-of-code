# ==============================================================================
# VALIDATION RULES
# ==============================================================================
validation:

  rules:
    - name: code_has_c_level
      condition: "type in CODOME implies c_level is not null"

    - name: contextome_no_c_level
      condition: "type in CONTEXTOME implies c_level is null"

    - name: all_have_m_level
      condition: "all artifacts have m_level defined"

    - name: m0_is_object
      condition: "m_level = M₀ implies artifact is object-level (code or data)"

    - name: theory_is_m2_plus
      condition: "theory documents have m_level >= M₂"

  expected_results:
    total_artifacts: 35
    codome_count: 15
    contextome_count: 13
    observer_count: 3
    edge_cases: 6
    external_count: 3
