# =============================================================================
# DOCLING GPU ACCELERATION PROFILES
# =============================================================================
# Pre-configured profiles for different GPU hardware.
# Select profile via: DOCLING_GPU_PROFILE=rtx4090 python -m docling_processor
# =============================================================================

profiles:
  # CPU-only profile (default fallback)
  cpu:
    device: "cpu"
    ocr_batch_size: 4
    layout_batch_size: 4
    table_batch_size: 2
    omp_num_threads: 4

  # Apple Silicon (M1/M2/M3/M4)
  apple_silicon:
    device: "mps"
    ocr_batch_size: 16
    layout_batch_size: 16
    table_batch_size: 4
    omp_num_threads: 8

  # NVIDIA RTX 3080/3090 (10-24GB)
  rtx3090:
    device: "cuda"
    ocr_batch_size: 32
    layout_batch_size: 32
    table_batch_size: 4
    gpu_memory_utilization: 0.8

  # NVIDIA RTX 4080/4090 (16-24GB)
  rtx4090:
    device: "cuda"
    ocr_batch_size: 64
    layout_batch_size: 64
    table_batch_size: 4
    gpu_memory_utilization: 0.85

  # NVIDIA RTX 5070/5080 (12-16GB)
  rtx5070:
    device: "cuda"
    ocr_batch_size: 16
    layout_batch_size: 16
    table_batch_size: 2
    gpu_memory_utilization: 0.85

  # NVIDIA RTX 5090 (32GB)
  rtx5090:
    device: "cuda"
    ocr_batch_size: 128
    layout_batch_size: 128
    table_batch_size: 8
    gpu_memory_utilization: 0.9

  # Cloud GPU (A100 40GB)
  a100_40gb:
    device: "cuda"
    ocr_batch_size: 128
    layout_batch_size: 128
    table_batch_size: 8
    gpu_memory_utilization: 0.9

  # Cloud GPU (A100 80GB)
  a100_80gb:
    device: "cuda"
    ocr_batch_size: 256
    layout_batch_size: 256
    table_batch_size: 16
    gpu_memory_utilization: 0.9

  # VLM Pipeline (with vLLM server)
  vlm_optimized:
    device: "cuda"
    ocr_batch_size: 64
    layout_batch_size: 64
    table_batch_size: 4
    vlm_enabled: true
    vlm_url: "http://localhost:8000/v1/chat/completions"
    vlm_model: "ibm-granite/granite-docling-258M"
    vlm_concurrency: 64
    page_batch_size: 64

# =============================================================================
# vLLM SERVER CONFIGURATIONS
# =============================================================================
# Start vLLM server with these configs for optimal performance

vllm_configs:
  # Standard GPU (16-24GB)
  standard:
    command: >
      vllm serve ibm-granite/granite-docling-258M
      --host 127.0.0.1 --port 8000
      --max-num-seqs 256
      --max-num-batched-tokens 4096
      --enable-chunked-prefill
      --gpu-memory-utilization 0.85

  # High-memory GPU (32GB+)
  high_memory:
    command: >
      vllm serve ibm-granite/granite-docling-258M
      --host 127.0.0.1 --port 8000
      --max-num-seqs 512
      --max-num-batched-tokens 8192
      --enable-chunked-prefill
      --gpu-memory-utilization 0.9

  # Multi-GPU
  multi_gpu:
    command: >
      vllm serve ibm-granite/granite-docling-258M
      --host 127.0.0.1 --port 8000
      --tensor-parallel-size 2
      --max-num-seqs 1024
      --max-num-batched-tokens 16384
      --enable-chunked-prefill

# =============================================================================
# PERFORMANCE BENCHMARKS (Reference)
# =============================================================================
# Measured on standard academic PDFs (10-50 pages)

benchmarks:
  cpu_only:
    pages_per_second: 1.5-3.0
    memory_mb: 2000-4000

  apple_silicon_m3:
    pages_per_second: 4.0-6.0
    memory_mb: 3000-5000

  rtx4090_standard:
    pages_per_second: 8.0-12.0
    memory_mb: 4000-8000

  rtx4090_vlm:
    pages_per_second: 3.0-4.5
    memory_mb: 6000-12000

  a100_standard:
    pages_per_second: 15.0-25.0
    memory_mb: 8000-16000
