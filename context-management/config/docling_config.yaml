# =============================================================================
# DOCLING BATCH PROCESSOR CONFIGURATION
# =============================================================================
# Tool: T054 - Docling-Granite Document Processor
#
# This configuration controls batch processing of academic PDFs.
# Override with environment variables: DOCLING_INPUT_DIR, DOCLING_OUTPUT_DIR, OMP_NUM_THREADS
# =============================================================================

# Paths (relative paths resolved from project root)
input_dir: "context-management/archive/references/pdf"
output_dir: "context-management/archive/references/docling_output"

# =============================================================================
# OCR AND TABLE SETTINGS
# =============================================================================

# Enable OCR for scanned documents
# - true: Full OCR (slower, handles scans and images)
# - false: Text extraction only (faster, text-native PDFs only)
enable_ocr: true

# Enable table structure recognition
# - true: Extract tables with structure (rows, columns, headers)
# - false: Tables extracted as plain text
enable_table_structure: true

# =============================================================================
# FALLBACK BEHAVIOR
# =============================================================================

# Enable progressive fallback for problematic PDFs
# Strategy order: standard -> no_ocr -> minimal -> chunked
enable_fallbacks: true

# Maximum fallback attempts per file (4 = try all strategies)
max_fallback_retries: 4

# =============================================================================
# CHUNKING FOR RAG
# =============================================================================

# Enable chunk generation for RAG/vector storage
enable_chunking: true

# Maximum tokens per chunk (MiniLM default: 512)
chunk_max_tokens: 512

# Overlap tokens between chunks for context continuity
chunk_overlap_tokens: 50

# =============================================================================
# PERFORMANCE
# =============================================================================

# Number of OpenMP threads for processing
# Recommendation: 4 for most machines, reduce if memory-constrained
omp_num_threads: 4

# Number of files to process before checkpoint save
batch_size: 10

# =============================================================================
# ERROR HANDLING
# =============================================================================

# Continue processing on individual file errors
# - true: Log error, mark as failed, continue to next file
# - false: Stop entire batch on first error
continue_on_error: true

# Skip files with more pages than this limit
max_page_limit: 500

# =============================================================================
# OUTPUT OPTIONS
# =============================================================================

# Export markdown (.md) for each PDF
export_markdown: true

# Export DocTags JSON (.json) for each PDF
export_json: true

# Export RAG chunks (_chunks.json) for each PDF
export_chunks: true
