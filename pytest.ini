[pytest]
# Root-level test scope: only maintained suites
testpaths =
    particle/tests
    wave/tests

# Allow particle tests to import `src.core.*` from repository root runs
pythonpath =
    particle
    particle/src
    particle/src/core

addopts = -ra

# Keep legacy/archive/script trees out of collection
norecursedirs =
    .git
    .venv
    .tools_venv
    archive
    wave/library
    wave/llm-threads
    particle/tests/specs
    **/__pycache__
    **/node_modules
