subsystems:
  - name: PARTICLE
    description: "Collider engine + Standard Model theory (the 'Body')"
    root_dirs:
      code: particle/src/core
      context: particle/docs
    entrypoints:
      - particle/cli.py
      - particle/src/core/full_analysis.py
    canonical_docs:
      - particle/docs/MODEL.md
      - particle/docs/theory/THEORY_AXIOMS.md
      - particle/CLAUDE.md
    generated_outputs:
      - "*.collider/"
      - unified_analysis.json
      - collider_report.html
    status: active
    maturity: production
    validators:
      - pytest tests/
      - python tools/validate_ui.py

  - name: WAVE
    description: "AI tools + context management (the 'Brain')"
    root_dirs:
      code: wave/tools/ai
      context: wave/docs
    entrypoints:
      - wave/tools/ai/analyze.py
      - wave/tools/ai/aci/refinery.py
    canonical_docs:
      - wave/docs/AI_USER_GUIDE.md
      - wave/docs/PROJECTOME.md
      - wave/docs/CONTEXTOME.md
    generated_outputs:
      - research/gemini/           # Consolidated 2026-02-01
      - research/perplexity/       # Consolidated 2026-02-01
      - .agent/intelligence/chunks/
    status: active
    maturity: production
    validators:
      - python wave/tools/ai/analyze.py --briefing

  - name: OBSERVER
    description: "Governance + task registry + decision deck"
    root_dirs:
      code: .agent/tools
      context: .agent/intelligence
    entrypoints:
      - .agent/tools/autopilot.py
      - .agent/tools/wire.py
      - ./pe deck
    canonical_docs:
      - .agent/META_REGISTRY.yaml
      - .agent/intelligence/WHEN_YOU_RETURN.md
    generated_outputs:
      - .agent/intelligence/autopilot_logs/
      - .agent/macros/logs/
    status: active
    maturity: beta
    validators:
      - ./pe status

  - name: TEMPORAL_INTELLIGENCE
    description: "File popularity tracking, temporal analytics, and REH (Repository Evolution History)"
    root_dirs:
      code: particle/src/core
      context: .agent/intelligence
    entrypoints:
      - particle/src/core/reh_core.py
      - particle/src/core/temporal_analysis.py
      - wave/tools/mcp/mcp_history_server.py
      - particle/scripts/generate_repo_timestamps.py
      - particle/scripts/file_popularity_tracker.py
    canonical_docs:
      - .agent/intelligence/TOOLS_REGISTRY.yaml
      - governance/DECISIONS.md  # D9: REH Canonical Architecture
    generated_outputs:
      - project_elements_file_timestamps.csv (TDJ - centralized)
      - .file_popularity/ (reports)
      - .reh/ (REH state maps, ecosystem wrapper output)
      - "**/*.metadata.json" (decentralized - future)
    status: active
    maturity: beta
    validators:
      - python file_popularity_tracker.py --dead-only
    feeds:
      - WAVE (Refinery Stage 5.5 - relevance boost)
      - AI_Tools (analyze.py - context selection)
      - OBSERVER (archive decisions)

