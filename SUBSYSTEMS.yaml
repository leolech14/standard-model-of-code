# SUBSYSTEMS REGISTRY - Single Source of Truth
# Auto-generated tables MUST derive from this file
# Version: 1.0.0
# Updated: 2026-01-27

subsystems:
  - name: PARTICLE
    description: "Collider engine + Standard Model theory (the 'Body')"
    root_dirs:
      code: standard-model-of-code/src/core
      context: standard-model-of-code/docs
    entrypoints:
      - standard-model-of-code/cli.py
      - standard-model-of-code/src/core/full_analysis.py
    canonical_docs:
      - standard-model-of-code/docs/MODEL.md
      - standard-model-of-code/docs/theory/THEORY_AXIOMS.md
      - standard-model-of-code/CLAUDE.md
    generated_outputs:
      - "*.collider/"
      - unified_analysis.json
      - collider_report.html
    status: active
    maturity: production
    validators:
      - pytest tests/
      - python tools/validate_ui.py

  - name: WAVE
    description: "AI tools + context management (the 'Brain')"
    root_dirs:
      code: context-management/tools/ai
      context: context-management/docs
    entrypoints:
      - context-management/tools/ai/analyze.py
      - context-management/tools/ai/aci/refinery.py
    canonical_docs:
      - context-management/docs/AI_USER_GUIDE.md
      - context-management/docs/PROJECTOME.md
      - context-management/docs/CONTEXTOME.md
    generated_outputs:
      - docs/research/gemini/
      - docs/research/perplexity/
      - .agent/intelligence/chunks/
    status: active
    maturity: production
    validators:
      - python context-management/tools/ai/analyze.py --briefing

  - name: OBSERVER
    description: "Governance + task registry + decision deck"
    root_dirs:
      code: .agent/tools
      context: .agent/intelligence
    entrypoints:
      - .agent/tools/autopilot.py
      - .agent/tools/wire.py
      - ./pe deck
    canonical_docs:
      - .agent/META_REGISTRY.yaml
      - .agent/intelligence/WHEN_YOU_RETURN.md
    generated_outputs:
      - .agent/intelligence/autopilot_logs/
      - .agent/macros/logs/
    status: active
    maturity: beta
    validators:
      - ./pe status

  - name: ARCHIVE
    description: "Historical snapshots + deprecated experiments"
    root_dirs:
      code: archive/
      context: standard-model-of-code/docs/archive/
    entrypoints: []
    canonical_docs: []
    generated_outputs: []
    status: archive
    maturity: deprecated
    validators: []

# Subsystem relationships
relationships:
  - source: PARTICLE
    target: WAVE
    type: uses
    description: "Collider calls analyze.py for AI insights"

  - source: WAVE
    target: PARTICLE
    type: validates
    description: "HSL validates code against theory"

  - source: OBSERVER
    target: PARTICLE
    type: orchestrates
    description: "Autopilot runs Collider analysis"

  - source: OBSERVER
    target: WAVE
    type: orchestrates
    description: "Autopilot queries analyze.py"

# Verification rules
verification:
  atom_uniqueness:
    description: "All atom IDs must be unique within each YAML file"
    check: "python tools/verify_atoms.py --check-duplicates"

  link_integrity:
    description: "All internal markdown links must resolve"
    check: "python tools/verify_links.py --active-only"

  count_consistency:
    description: "Generated indexes must match source registries"
    check: "python tools/verify_counts.py"

  subsystem_symmetry:
    description: "Every subsystem must have both code and context"
    check: "python tools/verify_symmetry.py"
