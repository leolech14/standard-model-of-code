  - id: CR-003
    title: "Auth Bridge Implementation"
    description: |
      Extract Touch ID code from file_explorer.py.
      Create FastAPI auth endpoints:
        - POST /auth/biometric → trigger Touch ID
        - GET /auth/verify → validate session
        - POST /auth/logout → clear session
      Implement React AuthContext.
      Create SecureGate component (blocks until authed).
    phase: 2
    priority: P0
    estimated_hours: 12
    confidence: 70
    risk_level: HIGH
    input_files:
      - source-b/file_explorer.py (lines 108-168)
    output_files:
