      - merged/frontend/src/components/SecureGate.tsx
    dependencies: [CR-001]
    test_criteria: |
      - Touch ID prompt appears on macOS
      - Session token stored in httpOnly cookie
      - Unauthenticated requests return 401
      - SecureGate blocks render until authed
    risks:
