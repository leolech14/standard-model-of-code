name: CI
# PROJECT_elements CI pipeline
# Three jobs: lint (fast), test (core), collider-gate (main branch only)
#
# AI AGENTS: Common edits:
#   - Change Python version: update python-version below
#   - Add test matrix: add strategy.matrix to the test job
#   - Skip collider gate on specific paths: add paths-ignore to the push trigger
#   - PDS gate: uses cached baseline across runs to detect regressions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies (with dev extras)
        working-directory: particle
        run: uv sync --extra dev
      - name: Run tests
        working-directory: particle
        run: uv run pytest tests/ -q

  collider-gate:
    name: Collider Gate (PDS)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need HEAD~1 for PDS diff
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies (with dev extras)
        working-directory: particle
        run: uv sync --extra dev

      # Restore previous baseline (if cached from prior run)
      - name: Restore PDS baseline cache
        id: baseline-cache
        uses: actions/cache@v4
        with:
          path: particle/.collider/pds_baseline.json
          key: pds-baseline-${{ github.sha }}
          restore-keys: |
            pds-baseline-

      # Run full analysis (always -- establishes ground truth)
      - name: Run full analysis
        working-directory: particle
        run: |
          uv run python cli.py full . --output .collider/ --quiet 2>&1 || true
          echo "Full analysis complete."
          if [ -f .collider/pds_baseline.json ]; then
            echo "Baseline size: $(wc -c < .collider/pds_baseline.json) bytes"
          fi

      # PDS gate: check for structural regressions in changed files
      - name: PDS structural gate
        working-directory: particle
        run: |
          uv run python cli.py pds --json --verbose 2>&1 || true
          # Gate is informational until baseline cache stabilizes.
          # The output above shows findings; CI does not block on PDS yet.
          # To make it blocking, remove '|| true' above.

      # Cache the new baseline for next run
      - name: Save PDS baseline
        uses: actions/cache/save@v4
        if: always()
        with:
          path: particle/.collider/pds_baseline.json
          key: pds-baseline-${{ github.sha }}
