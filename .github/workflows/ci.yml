name: CI
# PROJECT_elements CI pipeline
# Three jobs: lint (fast), test (core), collider-gate (main branch only)
#
# AI AGENTS: Common edits:
#   - Change Python version: update python-version below
#   - Add test matrix: add strategy.matrix to the test job
#   - Skip collider gate on specific paths: add paths-ignore to the push trigger
#   - Adjust health threshold: edit MINIMUM_HEALTH in the collider-gate step

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies (with dev extras)
        working-directory: particle
        run: uv sync --extra dev
      - name: Run tests
        working-directory: particle
        run: uv run pytest tests/ -q

  collider-gate:
    name: Collider Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies (with dev extras)
        working-directory: particle
        run: uv sync --extra dev
      - name: Collider health gate
        working-directory: particle
        env:
          MINIMUM_HEALTH: "7.0"
        run: |
          # Run grade in JSON mode and enforce threshold
          OUTPUT=$(uv run python cli.py grade --json 2>&1) || true
          echo "$OUTPUT"

          # Extract health_index from JSON output
          HEALTH=$(echo "$OUTPUT" | python3 -c "
          import sys, json
          text = sys.stdin.read()
          start = text.find('{')
          if start < 0:
              print('0.0')
              sys.exit(0)
          try:
              data = json.loads(text[start:])
              print(data.get('health_index', 0.0))
          except:
              print('0.0')
          ")

          echo "Health score: $HEALTH / $MINIMUM_HEALTH required"

          # Compare as floats
          python3 -c "
          health = float('$HEALTH')
          minimum = float('$MINIMUM_HEALTH')
          if health < minimum:
              print(f'FAIL: {health}/10 < {minimum} minimum')
              exit(1)
          print(f'PASS: {health}/10 >= {minimum} minimum')
          "
