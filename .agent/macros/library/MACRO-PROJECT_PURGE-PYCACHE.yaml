id: MACRO-PROJECT_PURGE-PYCACHE
name: "Purge Python Cache Across All Projects"
version: 1.0.0
status: DRAFT
created: '2026-03-07T12:00:00Z'
author: claude-opus-4-6 + leonardo.lech
description: |
  Removes all __pycache__ directories and .pyc files across PROJECTS_all.
  These are auto-regenerated by Python on next import. Zero risk.

  Previous scan found: 881+ __pycache__ dirs, 8,932+ .pyc files in PROJECT_elements alone.
  Estimated savings: 300-800 MB across all projects.
tags:
  - cleanup
  - disk-space
  - python
  - regenerable
scope: PROJECTS_all

trigger:
  type: manual
  # Future: schedule weekly or post-commit

preconditions:
  - condition: "No active Python processes depending on cached bytecode"
    required: false
    reason: "Python will just recompile — minor startup hit"

steps:
  - id: count_before
    description: "Count pycache dirs and .pyc files"
    tool: Bash
    params:
      command: |
        echo "=== __pycache__ dirs ==="
        find ~/PROJECTS_all -name "__pycache__" -type d 2>/dev/null | wc -l
        echo "=== .pyc files ==="
        find ~/PROJECTS_all -name "*.pyc" 2>/dev/null | wc -l
    output_var: count_before
    on_failure: continue

  - id: purge_pycache
    description: "Remove all __pycache__ dirs recursively"
    tool: Bash
    params:
      command: |
        find ~/PROJECTS_all -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null
        echo "DONE: __pycache__ dirs removed"
    output_var: purge_dirs
    on_failure: continue

  - id: purge_pyc
    description: "Remove stray .pyc files not in __pycache__"
    tool: Bash
    params:
      command: |
        find ~/PROJECTS_all -name "*.pyc" -delete 2>/dev/null
        echo "DONE: .pyc files removed"
    output_var: purge_files
    on_failure: continue

  - id: verify
    description: "Confirm cleanup"
    tool: Bash
    params:
      command: |
        remaining=$(find ~/PROJECTS_all -name "__pycache__" -type d 2>/dev/null | wc -l)
        echo "Remaining __pycache__ dirs: $remaining"
    expect: "Remaining __pycache__ dirs: 0"
    output_var: verification
    on_failure: continue

success_criteria:
  - "All __pycache__ removed"
  - "All .pyc removed"

output:
  type: manifest
  path: ".agent/macros/logs/MACRO-PROJECT_PURGE-PYCACHE/{date}.manifest.yaml"
  format: yaml

executions: []
