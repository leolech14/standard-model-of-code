# =============================================================================
# ACCEPTANCE CRITERIA
# =============================================================================
acceptance_criteria:
  - "All 18 files classified with reasoning"
  - "ACTIVE files committed with git add"
  - "EXPERIMENT files moved to tools/experiments/"
  - "DEAD files archived to archive/tools/"
  - "No untracked .py files remaining in tools/ or context-management/tools/"
  - "Commit message documents classification decisions"

# =============================================================================
# IMPLEMENTATION STEPS
# =============================================================================
steps:
  - id: 1
    action: "List all untracked Python files"
    agent: Bash
    command: "git status --porcelain | grep '??' | grep '\\.py$' | sort"

  - id: 2
    action: "Check each file for docstring and imports"
    agent: Explore
    prompt: |
      For each untracked .py file:
      1. Does it have a module docstring?
      2. Do its imports resolve?
      3. Is it referenced by other files?
      4. When was it last modified?
      Produce classification table.

  - id: 3
    action: "Create experiments directory if needed"
    agent: Bash
    command: "mkdir -p tools/experiments"

  - id: 4
    action: "Move experiment files"
    agent: Bash
    command: "mv tools/fix_reader_links.py tools/experiments/ # etc"

  - id: 5
    action: "Stage active files"
    agent: Bash
    command: "git add tools/file_explorer.py tools/file_scanner.py # etc"

  - id: 6
    action: "Commit with classification summary"
    agent: Bash
    command: |
      git commit -m "chore(tools): Triage and commit untracked Python tools

      Classification of 18 untracked .py files:

      ACTIVE (committed):
      - tools/file_explorer.py (314KB GUI)
      - tools/file_scanner.py
      - [list others]

      EXPERIMENT (moved to tools/experiments/):
      - tools/fix_reader_links.py
      - [list others]

      Part of TASK-101, BATCH-CONSOLIDATION-2026-01-31

      Co-Authored-By: Claude Opus 4.5 <noreply@anthropic.com>"

