id: TASK-101
title: "Triage and commit untracked Python tools"
status: COMPLETE
priority: P0
domain: tools

# =============================================================================
# 4D CONFIDENCE ASSESSMENT
# =============================================================================
confidence:
  factual: 85
  # Evidence: 18 untracked .py files identified via git status
  # Evidence: file_explorer.py is 314KB (substantial, likely active)
  # Concern: Need to verify each file's purpose and activity

  alignment: 95
  # Evidence: Uncommitted code = invisible code = technical debt
  # Evidence: Supports reproducibility and collaboration
  # Evidence: Enables proper versioning and history

  current: 80
  # Evidence: Files exist and appear runnable
  # Risk: May have undocumented dependencies
  # Risk: Some may be experiments that should stay untracked

  onwards: 90
  # Evidence: Once tracked, can be properly maintained
  # Evidence: Enables CI/CD integration
  # Evidence: Enables code review

  overall: 80  # min(85, 95, 80, 90)

verdict: ACCEPT

# =============================================================================
# DESCRIPTION
# =============================================================================
description: |
  ## Problem
  18 Python files are untracked across tools/ and context-management/tools/.
  These include:
  - file_explorer.py (314KB) - substantial GUI tool
  - Multiple verification scripts
  - AI integration tools
  - Consolidation utilities (created by previous agents)

  ## Solution
  Classify each file and take appropriate action:
  - ACTIVE: Commit to git with proper documentation
  - EXPERIMENT: Move to tools/experiments/
  - DEAD: Archive or delete

  ## Classification Criteria
  - Has docstring/module documentation?
  - Has imports that resolve?
  - Referenced elsewhere in codebase?
  - Recently modified (within 7 days)?
  - Part of known workflow?

