# =============================================================================
# DESCRIPTION
# =============================================================================
description: |
  ## Problem
  Git status shows 292+ untracked files including:
  - Research raw JSON and session files (ephemeral)
  - Log files across multiple directories
  - Large generated files (PDF, ZIP)
  - CSV inventories that can be regenerated
  - Agent intelligence ephemeral outputs

  ## Solution
  Add comprehensive .gitignore patterns to exclude ephemeral/generated content.

  ## Impact
  - Unblocks all subsequent consolidation tasks
  - Reduces git status noise immediately
  - Prevents accidental commits of large files

# =============================================================================
# ACCEPTANCE CRITERIA
# =============================================================================
acceptance_criteria:
  - ".gitignore includes all consolidation patterns"
  - "git status --porcelain count reduced by 50%+"
  - "Large files (*.pdf, *.zip) no longer shown as untracked"
  - "Research raw/sessions directories ignored"
  - "Log directories ignored"
  - "No tracked files accidentally untracked"

# =============================================================================
# IMPLEMENTATION
# =============================================================================
patterns_to_add: |
  # =============================================================================
  # Consolidation patterns (2026-01-31)
  # =============================================================================

  # Research ephemeral data (keep docs/, ignore raw/ and sessions/)
  research/raw/
  research/sessions/
  **/research/raw/
  **/research/sessions/

  # Log files across all directories
  **/logs/**
  *.log

  # Large generated files (PDFs kept in docs/ only)
  *.pdf
  !docs/**/*.pdf

  # Archives and zips
  *.zip
  *.tar.gz

  # Tool-generated inventories
  tools/*.csv

  # Agent ephemeral outputs
  .agent/intelligence/autopilot_logs/
  .agent/intelligence/confidence_reports/
  .agent/macros/logs/

steps:
  - id: 1
    action: "Read current .gitignore"
    command: "cat .gitignore"

  - id: 2
    action: "Append consolidation patterns"
    command: "Edit .gitignore with patterns_to_add"

  - id: 3
    action: "Verify patterns work"
    command: "git status --porcelain | wc -l"

  - id: 4
    action: "Commit .gitignore update"
    command: |
      git add .gitignore
      git commit -m "chore(gitignore): Add consolidation patterns

      Patterns added for:
      - Research raw/sessions (ephemeral)
      - Log directories
      - Large files (PDF, ZIP)
      - Tool CSVs (regeneratable)
      - Agent ephemeral outputs

      Part of BATCH-CONSOLIDATION-2026-01-31

      Co-Authored-By: Claude Opus 4.5 <noreply@anthropic.com>"

