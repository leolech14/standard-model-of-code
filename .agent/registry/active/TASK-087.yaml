# DESCRIPTION
# =============================================================================
description: |
  ## Problem
  semantic_finder.py uses HARDCODED patterns for semantic matching:
  - ROLE_CLUSTERS: Static dictionary
  - LAYER_ORDER: Fixed list
  - Pattern matching against frozen strings

  cerebras_rapid_intel.py generates DYNAMIC intelligence:
  - semantic_index.json: Concepts extracted from actual codebase
  - Per-file purpose, concepts, quality scores
  - Concept → file mappings

  ## Solution
  Wire the index into semantic_finder so attention filtering uses REAL data.

  ## Validation
  analyze.py confirmed: "Architecturally Sound & Critical"
  - Fills "Attention Mechanism Failure" gap from DEEP_TRUTH_AUDIT
  - Elevates from Tier 0 (regex) to Tier 1/2 (semantic matching)

# =============================================================================
# ACCEPTANCE CRITERIA
# =============================================================================
acceptance_criteria:
  - semantic_finder.py loads semantic_index.json on import
  - Falls back to hardcoded patterns if index unavailable
  - _match_concepts_from_index() scores queries against real concepts
  - semantic_match() returns suggested_files from concept→file mappings
  - Tests pass: analyze.py --aci query shows concept-based suggestions
  - Latency: < 100ms for index lookup (cached in memory)

