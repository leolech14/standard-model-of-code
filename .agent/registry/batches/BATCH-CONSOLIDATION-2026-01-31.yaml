# =============================================================================
# BATCH: Repository Consolidation Sprint
# Created: 2026-01-31
# Purpose: Systematic cleanup and organization of PROJECT_elements
# =============================================================================

batch_id: BATCH-CONSOLIDATION-2026-01-31
title: "Repository Consolidation Sprint"
description: |
  Systematic consolidation of scattered files, directories, and documentation
  across PROJECT_elements. Identified 7 major consolidation areas with
  292 untracked files and 839 MB of duplicated content.

# Priority ordering for execution
execution_order:
  - TASK-100  # Gitignore - unblocks everything
  - TASK-101  # Untracked tools - prevents future sprawl
  - TASK-102  # Large files - reduces repo bloat
  - TASK-103  # Intelligence dedup - clears 46MB confusion
  - TASK-104  # Research consolidation - 23MB cleanup
  - TASK-105  # Reports unification - 6 locations to 1
  - TASK-106  # Archive standardization - 3 patterns to 1
  - TASK-107  # Final validation - confirms everything

# =============================================================================
# AGENT DEPLOYMENT GUIDE
# =============================================================================
agent_deployment:
  overview: |
    Each task can be executed by Claude Code agents using the Task tool.
    Deploy agents in dependency order, waiting for blockers to complete.

  confidence_protocol:
    description: |
      Before executing any task, validate confidence scores are accurate.

      1. FACTUAL - Read all referenced files, verify paths exist
      2. ALIGNMENT - Reference CLAUDE.md and governance/DECISIONS.md
      3. CURRENT - Search for path references that would break
      4. ONWARDS - Reference governance/ROADMAP.md

    validation_tool: |
      python3 wave/tools/ai/analyze.py --set brain_active \
        "Validate TASK-XXX confidence scores"

  execution_strategy:
    parallel_safe:
      - TASK-101
      - TASK-102
      - TASK-103
      - TASK-104
      - TASK-105
    sequential_required:
      - TASK-100  # Must complete first
      - TASK-106  # Depends on 103, 104, 105
      - TASK-107  # Depends on all

    agent_mapping:
      TASK-100: Bash           # Simple file edit
      TASK-101: development-lead  # Code triage
      TASK-102: operations-lead   # GCS operations
      TASK-103: directory-explorer  # Directory analysis
      TASK-104: directory-explorer  # Directory consolidation
      TASK-105: directory-explorer  # Directory consolidation
      TASK-106: Bash           # File moves
      TASK-107: quality-lead   # Validation

# =============================================================================
# TASKS
# =============================================================================
tasks:

  # ---------------------------------------------------------------------------
  # TASK-100: Gitignore Hardening
  # ---------------------------------------------------------------------------
  - id: TASK-100
    title: "Add missing patterns to .gitignore"
    status: READY
    priority: P0
    domain: infrastructure

    confidence:
      factual: 100
      alignment: 100
      current: 100
      onwards: 100
      overall: 100

    verdict: ACCEPT

    description: |
      Add patterns to .gitignore for research raw/sessions, logs,
      large generated files, ephemeral intelligence, and CSV inventories.

    acceptance_criteria:
      - ".gitignore includes all consolidation patterns"
      - "git status no longer shows large files as untracked"
      - "Research raw/sessions are ignored"
      - "Log directories are ignored"

    patterns_to_add:
      - "# Consolidation patterns (2026-01-31)"
      - "research/raw/"
      - "research/sessions/"
      - "**/logs/**"
      - "*.pdf"
      - "!docs/**/*.pdf"
      - "*.zip"
      - "tools/*.csv"
      - ".agent/intelligence/autopilot_logs/"
      - ".agent/intelligence/confidence_reports/"
      - ".agent/macros/logs/"

    blocks: [TASK-101, TASK-102, TASK-103, TASK-104, TASK-105, TASK-106]
    blocked_by: []
    created: "2026-01-31T15:00:00Z"
    tags: [gitignore, infrastructure, consolidation, p0]

