# =============================================================================
# EXECUTION COMMANDS
# =============================================================================
execution_commands:

  validate_confidence: |
    # Before any task, validate its confidence
    python3 wave/tools/ai/analyze.py --set brain_active \
      "Validate TASK-XXX: [paste description].
       Check file paths exist, no breaking references, aligns with ROADMAP"

  execute_task_100: |
    # Gitignore hardening (run first, manually or via agent)
    cat >> .gitignore << 'EOF'

    # Consolidation patterns (2026-01-31)
    research/raw/
    research/sessions/
    **/logs/**
    *.pdf
    !docs/**/*.pdf
    *.zip
    tools/*.csv
    .agent/intelligence/autopilot_logs/
    .agent/intelligence/confidence_reports/
    .agent/macros/logs/
    EOF

  parallel_deploy: |
    # After TASK-100 completes, deploy 5 agents in parallel
    # Use Claude Code Task tool with subagent_type for each:
    # - TASK-101: development-lead
    # - TASK-102: operations-lead
    # - TASK-103: directory-explorer
    # - TASK-104: directory-explorer
    # - TASK-105: directory-explorer

  final_commit: |
    git add -A
    git commit -m "chore(consolidation): Complete repository consolidation sprint

    BATCH-CONSOLIDATION-2026-01-31 complete:
    - TASK-100: Gitignore hardened
    - TASK-101: Python tools triaged
    - TASK-102: Large files to GCS
