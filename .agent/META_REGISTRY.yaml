# .agent/META_REGISTRY.yaml
# Minimal meta-registry: WHERE to find WHAT
# Part of Bulk-to-Lean transition (CUTTING_PLAN Phase 1)

version: "1.0"
last_updated: "2026-01-23"

# =============================================================================
# AGENT SUBSYSTEMS
# =============================================================================
registries:
  tasks:
    active: ".agent/registry/active/"
    archive: ".agent/registry/archive/"
    inbox: ".agent/registry/inbox/"
    index: ".agent/registry/INDEX.md"

  intelligence:
    truths: ".agent/intelligence/truths/current_truths.yaml"
    # history/ archived to archive/agent_cuts/2026-01-23/

  sprints:
    active: ".agent/sprints/"
    current: ".agent/sprints/SPRINT-001.yaml"

  specs:
    dir: ".agent/specs/"
    cutting_plan: ".agent/specs/CUTTING_PLAN.md"
    bare: ".agent/specs/BACKGROUND_AUTO_REFINEMENT_ENGINE.md"

  tools:
    dir: ".agent/tools/"
    boost: ".agent/tools/confidence_validator.py"
    registry: ".agent/tools/task_store.py"

# =============================================================================
# BODY (COLLIDER) - Located in particle/
# =============================================================================
body:
  root: "particle/"
  entry: "particle/cli.py"
  pipeline: "particle/src/core/full_analysis.py"
  schema: "particle/schema/"
  viz: "particle/src/core/viz/"

# =============================================================================
# BRAIN (CONTEXT MANAGEMENT)
# =============================================================================
brain:
  root: "wave/"
  config: "wave/config/"
  tools: "wave/tools/"
  registry: "wave/registry/"

# =============================================================================
# ARCHIVE
# =============================================================================
archive:
  local: "particle/archive/"
  gcs: "gs://elements-archive-2026/"
  agent_cuts: "archive/agent_cuts/"

# =============================================================================
# DOCS
# =============================================================================
docs:
  theory: "particle/docs/MODEL.md"
  tool: "particle/docs/COLLIDER.md"
  registries: "particle/docs/specs/REGISTRY_OF_REGISTRIES.md"
  integration: ".agent/SUBSYSTEM_INTEGRATION.md"
# =============================================================================
# HIGH-ORDER REGISTRIES
# =============================================================================
meta:
  ror: "particle/docs/specs/REGISTRY_OF_REGISTRIES.md"  # Registry of Registries
  lol: ".agent/intelligence/LOL.yaml"                                # List of Lists (Authoritative)
  sos: "particle/docs/specs/FRONTEND_SUBSYSTEM_REGISTRY.md" # System of Systems
  subsystems: "SUBSYSTEMS.yaml"  # Subsystems Registry (ROOT - canonical)
