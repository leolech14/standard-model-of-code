  cerebras_enricher:
    id: T056
    name: "Cerebras Semantic Enricher"
    subsystem: WAVE
    realm: wave
    description: |
      Adds semantic layer on top of Collider output using Cerebras (3000 t/s).
      Extracts: purpose, tags, exports, dependencies, complexity, quality hints.
      Complements Collider (structure) with meaning (semantics).

    invoke:
      method: cli
      command: "python3 {tool_path} enrich {collider_output} --model {model}"
      tool_path: "wave/tools/ai/cerebras_enricher.py"
      cwd: "${PROJECT_ROOT}"

    inputs:
      - name: collider_output
        type: file
        from: collider.unified_analysis.json
        required: true
      - name: model
        type: enum
        values: [llama-3.3-70b, llama3.1-8b, qwen-3-32b]
        default: llama3.1-8b

    outputs:
      - name: enriched_latest.json
        type: file
        format: json
        location: "wave/data/enriched/"
        contains:
          - purpose (one-line intent)
          - semantic_tags (5 tags)
          - key_exports (functions/classes)
          - dependencies
          - complexity (LOW/MEDIUM/HIGH)
          - quality_hints
          - related_to (suggested files)

    requires:
      - CEREBRAS_API_KEY

    connects_to:
      - collider  # Takes Collider output as input

    status: working
    validated_accuracy: "90% (Perplexity-verified)"

  cerebras_tagger:
    id: T057
