# =============================================================================
# TOOLS REGISTRY - Executable Component Connections
# =============================================================================
# Unlike LOL.yaml (documentation), this registry defines HOW to invoke
# components and HOW they connect to each other via inputs/outputs.
#
# FORMAL DEFINITION:
#   TOOL = (invoke, inputs, outputs, requires, connects_to)
#   PIPELINE = ordered sequence of TOOLs where:
#     ∀ adjacent (T1, T2): T1.outputs ∩ T2.inputs ≠ ∅
#
# Updated: 2026-01-26
# =============================================================================

version: "1.0.0"
schema: "tool_registry_v1"

# =============================================================================
# TOOL DEFINITIONS
# =============================================================================
tools:

  # ---------------------------------------------------------------------------
  # PARTICLE REALM (Analysis)
  # ---------------------------------------------------------------------------
  collider:
    id: T001
    name: "Collider"
    subsystem: S1
    realm: particle

    invoke:
      method: cli
      command: "./pe collider full {input_path} --output {output_dir}"
      cwd: "${PROJECT_ROOT}"

    inputs:
      - name: input_path
        type: path
        description: "Directory or file to analyze"
        required: true

    outputs:
      - name: unified_analysis.json
        type: file
        format: json
        schema: "standard-model-of-code/schema/unified_analysis.schema.json"

      - name: collider_report.html
        type: file
        format: html

    requires:
      - tree-sitter
      - tree-sitter-python
      - tree-sitter-javascript


  # ---------------------------------------------------------------------------
  purpose_field:
    id: T002
    name: "Purpose Field Detector"
    subsystem: S1
    realm: particle

    invoke:
      method: python_import
      module: "standard-model-of-code.src.core.purpose_field"
      function: "detect_purpose_field"

    inputs:
      - name: nodes
        type: list
        from: collider.unified_analysis.json.nodes

      - name: edges
        type: list
        from: collider.unified_analysis.json.edges

    outputs:
      - name: purpose_field
        type: object
        contains:
          - coherence_score
          - purpose_entropy
          - composite_purpose
          - god_classes

    requires: []
    status: working

    note: "Computed but not exported until Stage 3.7 runs"

  # ---------------------------------------------------------------------------
  timestamp_daily_journal:
    id: T002.5
    name: "Timestamp Daily Journal (TDJ)"
    subsystem: OBSERVER
    realm: observer
    type: deterministic_script

    invoke:
      method: cli
      command: "python3 standard-model-of-code/scripts/generate_repo_timestamps.py"
      cwd: "${PROJECT_ROOT}"

    inputs:
      - name: repo_root
        type: path
        default: "."

    outputs:
      - name: project_elements_file_timestamps.csv
        type: file
        format: csv
        schema: "path,size_bytes,birth_epoch,birth_iso,modified_epoch,modified_iso"

    requires: []
    status: working

    note: "Foundation for temporal analysis - records all file creation/modification times"

  # ---------------------------------------------------------------------------
  file_popularity_tracker:
    id: T002.7
    name: "File Popularity Tracker"
    subsystem: OBSERVER
    realm: observer
    type: deterministic_script

    invoke:
      method: cli
      command: "python3 standard-model-of-code/scripts/file_popularity_tracker.py --output {output_dir}"
      cwd: "${PROJECT_ROOT}"

    inputs:
      - name: project_elements_file_timestamps.csv
        type: file
        from: timestamp_daily_journal
        required: true

    outputs:
      - name: file_popularity_report.json
        type: file
        format: json
        contains:
          - total_files
          - dead_files (created but never modified)
          - dead_percentage
          - top_10_popular (by modification frequency)
          - session_patterns (peak days, hours)

      - name: file_popularity_report.md
        type: file
        format: markdown

      - name: dead_files.txt
        type: file
        format: text
        description: "List of files created but never modified (candidates for archive)"

      - name: popular_files.txt
        type: file
        format: text
        description: "Top 50 most-modified files"

    requires:
      - timestamp_daily_journal

    status: implemented

    connects_to:
      - analyze  # Feeds popularity data as context
      - charts   # Can visualize as graph (node size = popularity)

    note: |
      The 'Big City' omniscience tool.
      When repo is too large to know everything, this identifies:
      - What's actually being used (popular)
      - What's forgotten (dead files)
      - When work happens (session patterns)
      - What's latest (temporal resolution)

      Use cases:
      - Archive dead files automatically
      - Prioritize refactoring on popular files
      - Understand collaboration patterns
      - Resolve 'which is latest?' conflicts via modification time

  # ---------------------------------------------------------------------------
  # WAVE REALM (Intelligence)
  # ---------------------------------------------------------------------------
  pom:
    id: T003
    name: "Projectome Omniscience Module"
    subsystem: null  # Not in S1-S13 yet!
    realm: wave

    invoke:
      method: cli
      command: "python3 {tool_path} --output {output_path}"
      tool_path: "context-management/tools/pom/projectome_omniscience.py"
      cwd: "${PROJECT_ROOT}"

    inputs:
      - name: unified_analysis.json
        type: file
        from: collider
        required: false  # Can scan without Collider

      - name: project_root
        type: path
        default: "."

    outputs:
      - name: pom_manifest.yaml
        type: file
        format: yaml
        contains:
          - totals.entities
          - symmetry.symmetric
          - symmetry.orphan
          - symmetry.phantom
          - symmetry.drift
          - purpose_field.coverage
          - purpose_field.coherence  # <- THE NUMBER WE WANT

    requires: []
    status: working

    connects_to:
      - charts  # POM output feeds charts

  # ---------------------------------------------------------------------------
  analyze:
    id: T004
    name: "AI Analysis Tool"
    subsystem: S3
    realm: wave

    invoke:
      method: cli
      command: "python3 {tool_path} {query} --mode {mode}"
      tool_path: "context-management/tools/ai/analyze.py"

    inputs:
      - name: query
        type: string
        required: true

      - name: mode
        type: enum
        values: [standard, forensic, architect]
        default: standard

      - name: context_files
        type: list
        from: any

    outputs:
      - name: analysis_result
        type: text
        format: markdown

    requires:
      - GEMINI_API_KEY

    status: working

  # ---------------------------------------------------------------------------
  # OBSERVER REALM (Visualization)
  # ---------------------------------------------------------------------------
  charts:
    id: T005
    name: "Purpose Field Charts"
    subsystem: null  # NEW
    realm: observer

    invoke:
      method: cli
      command: "python3 {tool_path} --input {input} --output {output}"
      tool_path: "context-management/tools/viz/purpose_charts.py"  # TO CREATE

    inputs:
      - name: unified_analysis.json
        type: file
        from: collider

      - name: pom_manifest.yaml
        type: file
        from: pom
        optional: true

    outputs:
      - name: purpose_charts.html
        type: file
        format: html

    requires: []
    status: not_implemented

  # ---------------------------------------------------------------------------
  # REFINERY (Intelligence Pipeline)
  # ---------------------------------------------------------------------------
  refinery_pipeline:
    id: T007
    name: "Refinement Pipeline"
    subsystem: WAVE
    realm: wave
    invoke:
      method: cli
      command: "python3 context-management/tools/refinery/pipeline.py {source_path}"
    inputs:
      - name: source_path
        type: path
        required: true
    outputs:
      - name: parcels
        type: list
        format: json
    status: implemented

  corpus_inventory:
    id: T008
    name: "Corpus Inventory"
    subsystem: WAVE
    realm: wave
    invoke:
      method: cli
      command: "python3 context-management/tools/refinery/corpus_inventory.py {dir}"
    status: implemented

  # ---------------------------------------------------------------------------
  # ACI (Adaptive Context Intelligence)
  # ---------------------------------------------------------------------------
  aci_refinery:
    id: T009
    name: "ACI Refinery"
    subsystem: WAVE
    realm: wave
    invoke:
      method: python_import
      module: "context-management.tools.ai.aci.refinery"
      class: "Refinery"
    status: implemented

  semantic_finder:
    id: T010
    name: "Semantic Finder"
    subsystem: WAVE
    realm: wave
    invoke:
      method: python_import
      module: "context-management.tools.ai.aci.semantic_finder"
    status: working

  intent_parser:
    id: T011
    name: "Intent Parser"
    subsystem: WAVE
    realm: wave
    invoke:
      method: python_import
      module: "context-management.tools.ai.aci.intent_parser"
    status: working

  # ---------------------------------------------------------------------------
  # DECK (Governance)
  # ---------------------------------------------------------------------------
  deck_router:
    id: T012
    name: "Decision Deck Router"
    subsystem: OBSERVER
    realm: observer
    invoke:
      method: cli
      command: "python3 context-management/tools/ai/deck/deck_router.py"
    status: implemented

  play_card:
    id: T013
    name: "Decision Card Player"
    subsystem: OBSERVER
    realm: observer
    invoke:
      method: cli
      command: "python3 context-management/tools/ai/deck/play_card.py {card_id}"
    inputs:
      - name: card_id
        type: string
        required: true
    status: implemented

  # ---------------------------------------------------------------------------
  # DESIGN REALM (Generative UI)
  # ---------------------------------------------------------------------------
  flash-ui:
    id: T006
    name: "Flash UI (Generative Component Engine)"
    subsystem: DESIGN
    realm: design
    type: generative_script

    invoke:
      method: cli
      command: "doppler run -- npx -y tsx scripts/flash-ui.ts"
      cwd: "PROJECTS_all/PROJECT_ui-ux/aquarela-ui"

    inputs:
      - name: reference_image
        type: file
        format: png
        description: "Visual design inspiration"

      - name: prompt
        type: string
        description: "Functional/style requirements"

    outputs:
      - name: GeneratedSidebar.tsx
        type: file
        format: react_component

    requires:
      - GEMINI_API_KEY
      - DYNAMIC_DESIGN_SYSTEM (Aquarela)

    status: working
    note: "Uses Gemini 3 Pro to evolve UI from visual references into functional React modules."

# =============================================================================
# PIPELINES (Pre-defined tool chains)
# =============================================================================
pipelines:

  full_analysis:
    name: "Complete Analysis Pipeline"
    description: "Analyze → Detect Purpose → Generate Manifest → Visualize"
    steps:
      - tool: collider
        output_to: /tmp/collider_output

      - tool: purpose_field
        input_from: collider
        note: "Runs as Stage 3.7 inside Collider"

      - tool: pom
        input_from: collider
        output_to: /tmp/pom_manifest.yaml

      - tool: charts
        input_from: [collider, pom]
        output_to: /tmp/purpose_charts.html

    expected_outputs:
      - unified_analysis.json
      - pom_manifest.yaml
      - purpose_charts.html

  quick_coherence:
    name: "Quick Coherence Check"
    description: "Just measure coherence from existing data"
    steps:
      - tool: pom
        input_from: existing_unified_analysis
        output_to: /tmp/quick_coherence.yaml

    expected_outputs:
      - coherence value > 0

# =============================================================================
# CONNECTION GRAPH (What connects to what)
# =============================================================================
connections:
  # Format: source.output -> target.input

  - from: collider.unified_analysis.json
    to: purpose_field.nodes

  - from: collider.unified_analysis.json
    to: pom.unified_analysis.json

  - from: collider.unified_analysis.json
    to: charts.unified_analysis.json

  - from: pom.pom_manifest.yaml
    to: charts.pom_manifest.yaml

  - from: purpose_field.coherence_score
    to: pom.purpose_field.coherence
    via: unified_analysis.json  # Stage 3.7 exports it

# =============================================================================
# STATUS SUMMARY
# =============================================================================
  working: [purpose_field, pom, analyze, flash-ui, collider]
  not_implemented: [charts]

  blockers: {}
