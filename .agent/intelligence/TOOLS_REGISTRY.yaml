# =============================================================================
# TOOLS REGISTRY - Executable Component Connections
# =============================================================================
# Unlike LOL.yaml (documentation), this registry defines HOW to invoke
# components and HOW they connect to each other via inputs/outputs.
#
# FORMAL DEFINITION:
#   TOOL = (invoke, inputs, outputs, requires, connects_to)
#   PIPELINE = ordered sequence of TOOLs where:
#     ∀ adjacent (T1, T2): T1.outputs ∩ T2.inputs ≠ ∅
#
# Updated: 2026-01-26
# =============================================================================

version: "1.0.0"
schema: "tool_registry_v1"

# =============================================================================
# TOOL DEFINITIONS
# =============================================================================
tools:

  # ---------------------------------------------------------------------------
  # PARTICLE REALM (Analysis)
  # ---------------------------------------------------------------------------
  collider:
    id: T001
    name: "Collider"
    subsystem: S1
    realm: particle

    invoke:
      method: cli
      command: "./pe collider full {input_path} --output {output_dir}"
      cwd: "${PROJECT_ROOT}"

    inputs:
      - name: input_path
        type: path
        description: "Directory or file to analyze"
        required: true

    outputs:
      - name: unified_analysis.json
        type: file
        format: json
        schema: "standard-model-of-code/schema/unified_analysis.schema.json"

      - name: collider_report.html
        type: file
        format: html

    requires:
      - tree-sitter
      - tree-sitter-python
      - tree-sitter-javascript


  # ---------------------------------------------------------------------------
  purpose_field:
    id: T002
    name: "Purpose Field Detector"
    subsystem: S1
    realm: particle

    invoke:
      method: python_import
      module: "standard-model-of-code.src.core.purpose_field"
      function: "detect_purpose_field"

    inputs:
      - name: nodes
        type: list
        from: collider.unified_analysis.json.nodes

      - name: edges
        type: list
        from: collider.unified_analysis.json.edges

    outputs:
      - name: purpose_field
        type: object
        contains:
          - coherence_score
          - purpose_entropy
          - composite_purpose
          - god_classes

    requires: []
    status: working

    note: "Computed but not exported until Stage 3.7 runs"

  # ---------------------------------------------------------------------------
  timestamp_daily_journal:
    id: T002.5
    name: "Timestamp Daily Journal (TDJ)"
    subsystem: OBSERVER
    realm: observer
    type: deterministic_script

    invoke:
      method: cli
      command: "python3 standard-model-of-code/scripts/generate_repo_timestamps.py"
      cwd: "${PROJECT_ROOT}"

    inputs:
      - name: repo_root
        type: path
        default: "."

    outputs:
      - name: project_elements_file_timestamps.csv
        type: file
        format: csv
        schema: "path,size_bytes,birth_epoch,birth_iso,modified_epoch,modified_iso"

    requires: []
    status: working

    note: "Foundation for temporal analysis - records all file creation/modification times"

  # ---------------------------------------------------------------------------
  file_popularity_tracker:
    id: T002.7
    name: "File Popularity Tracker"
    subsystem: OBSERVER
    realm: observer
    type: deterministic_script

    invoke:
      method: cli
      command: "python3 standard-model-of-code/scripts/file_popularity_tracker.py --output {output_dir}"
      cwd: "${PROJECT_ROOT}"

    inputs:
      - name: project_elements_file_timestamps.csv
        type: file
        from: timestamp_daily_journal
        required: true

    outputs:
      - name: file_popularity_report.json
        type: file
        format: json
        contains:
          - total_files
          - dead_files (created but never modified)
          - dead_percentage
          - top_10_popular (by modification frequency)
          - session_patterns (peak days, hours)

      - name: file_popularity_report.md
        type: file
        format: markdown

      - name: dead_files.txt
        type: file
        format: text
        description: "List of files created but never modified (candidates for archive)"

      - name: popular_files.txt
        type: file
        format: text
        description: "Top 50 most-modified files"

    requires:
      - timestamp_daily_journal

    status: implemented

    connects_to:
      - analyze  # Feeds popularity data as context
      - charts   # Can visualize as graph (node size = popularity)

    note: |
      The 'Big City' omniscience tool.
      When repo is too large to know everything, this identifies:
      - What's actually being used (popular)
      - What's forgotten (dead files)
      - When work happens (session patterns)
      - What's latest (temporal resolution)

      Use cases:
      - Archive dead files automatically
      - Prioritize refactoring on popular files
      - Understand collaboration patterns
      - Resolve 'which is latest?' conflicts via modification time

  # ---------------------------------------------------------------------------
  # WAVE REALM (Intelligence)
  # ---------------------------------------------------------------------------
  pom:
    id: T003
    name: "Projectome Omniscience Module"
    subsystem: null  # Not in S1-S13 yet!
    realm: wave

    invoke:
      method: cli
      command: "python3 {tool_path} --output {output_path}"
      tool_path: "context-management/tools/pom/projectome_omniscience.py"
      cwd: "${PROJECT_ROOT}"

    inputs:
      - name: unified_analysis.json
        type: file
        from: collider
        required: false  # Can scan without Collider

      - name: project_root
        type: path
        default: "."

    outputs:
      - name: pom_manifest.yaml
        type: file
        format: yaml
        contains:
          - totals.entities
          - symmetry.symmetric
          - symmetry.orphan
          - symmetry.phantom
          - symmetry.drift
          - purpose_field.coverage
          - purpose_field.coherence  # <- THE NUMBER WE WANT

    requires: []
    status: working

    connects_to:
      - charts  # POM output feeds charts

