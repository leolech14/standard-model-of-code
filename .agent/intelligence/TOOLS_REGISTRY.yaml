  # ---------------------------------------------------------------------------
  # DOCUMENT PROCESSING (Academic Papers)
  # ---------------------------------------------------------------------------
  docling_granite:
    id: T054
    name: "Docling-Granite Document Processor"
    subsystem: WAVE
    realm: wave
    type: external_tool

    description: |
      IBM Granite-Docling-258M: Vision-language model for academic paper processing.
      Converts PDFs to structured Markdown/JSON preserving:
      - Table topology
      - Equations (LaTeX)
      - Images with coordinates
      - Reading order
      Replaces manual PDF extraction for reference library.

    invoke:
      method: python_module
      command: "python -m context_management.tools.docling_processor process --file {input_pdf}"
      cwd: "${PROJECT_ROOT}"
      batch_command: "python -m context_management.tools.docling_processor process"

    inputs:
      - name: input_pdf
        type: path
        format: pdf
        description: "Academic paper PDF to process (or omit for batch)"
        required: false

    outputs:
      - name: "{basename}.md"
        type: file
        format: markdown
        description: "Structured markdown with preserved layout"

      - name: "{basename}.json"
        type: file
        format: json
        description: "DocTags structured output for RAG"

      - name: "{basename}_chunks.json"
        type: file
        format: json
        description: "RefineryNode chunks for RAG/Neo4j"

      - name: "manifest.json"
        type: file
        format: json
        description: "Batch manifest with processing results"

    requires:
      - docling>=2.71.0
      - docling-ibm-models
      - docling-core
      - tqdm
      - pyyaml

    connects_to:
      - reference_analyzer
      - import_academic_foundations
      - refinery  # Chunks as RefineryNodes

    deprecates:
      - description: "Manual PDF text extraction workflow"
        previous_method: "Unknown/manual txt/ extraction"

    status: working
    note: |
      Implemented 2026-01-31 with full batch processing.
      Features: 4-tier fallback, Parcel/Waybill tracking, HybridChunker.
      82 papers (~575MB) in context-management/archive/references/pdf/
      Config: context-management/config/docling_config.yaml
      Docs: context-management/tools/docling_processor/README.md

  # ---------------------------------------------------------------------------
  # DOCSINTEL (Documentation Intelligence)
  # ---------------------------------------------------------------------------
  docsintel:
    id: T053
    name: "DocsIntel (Documentation Intelligence)"
    subsystem: OBSERVER
    realm: observer
    type: mcp_orchestration

    description: |
      Umbrella layer for intelligent access to provider documentation via MCP servers.
      Provides structured access to Anthropic, GCP, AWS, and other provider docs.

    invoke:
      method: mcp
      servers:
        - anthropic-docs  # Search Anthropic documentation
        - context7        # 100+ framework docs (React, Next.js, etc.)
        - docs-mcp-server # Self-index any URL

    inputs:
      - name: query
        type: string
        description: "Documentation search query"
        required: true

      - name: provider
        type: enum
        values: [anthropic, gcp, aws, react, nextjs, any]
        default: any

    outputs:
      - name: documentation_result
        type: text
        format: markdown
        description: "Retrieved documentation with citations"

    requires:
      - mcp_servers_configured
      - claude_desktop_restart

    status: installed
    location: "context-management/tools/docsintel/"

    files:
      - DOCSINTEL.md      # Architecture & usage
      - POSITIONING.md    # Ontological analysis (why orthogonal to L-scale)
      - providers.yaml    # Provider registry
      - install.sh        # Installation script

    connects_to:
      - analyze  # Feeds provider context to AI analysis

    note: |
      The L-scale (L-3 to L12) is Codome-specific. DocsIntel operates on
      external Contextome, making it orthogonal to the level hierarchy.
      Position: OBSERVER.Ingestor (Miller's taxonomy)

  # ---------------------------------------------------------------------------
  # EXTERNAL AI MODELS (Hugging Face, etc.)
  # ---------------------------------------------------------------------------
  trellis_2:
    id: T052
    name: "TRELLIS.2 (Image to 3D)"
    subsystem: DESIGN
    realm: design
    type: external_api

    invoke:
      method: python_import
      module: "gradio_client"
      client: "microsoft/TRELLIS.2"

    inputs:
      - name: image
        type: file
        format: png|jpg
        description: "2D image to convert to 3D"
        required: true

      - name: seed
        type: int
        default: 0

      - name: resolution
        type: enum
        values: [512, 1024, 1536]
        default: 1024

    outputs:
      - name: model_3d_html
        type: html
        description: "3D model preview"

      - name: glb_file
        type: file
        format: glb
        description: "Extracted 3D model"

    requires:
      - gradio_client
      - HUGGINGFACE_API_KEY (optional for public spaces)

    status: working

    docs: "~/vault/ai-models/huggingface/trellis-2.md"
    setup: "docs/HUGGINGFACE_SETUP.md"
    reference: "docs/AI_MODELS_REFERENCE.md"

    note: |
      Microsoft TRELLIS.2 - Gradio Space for Image to 3D generation.
      Converts 2D images into 3D GLB models with texture.
      API docs in vault, secrets in Doppler (ai-tools/dev).

# =============================================================================
# PIPELINES (Pre-defined tool chains)
# =============================================================================
pipelines:

  full_analysis:
    name: "Complete Analysis Pipeline"
    description: "Analyze → Detect Purpose → Generate Manifest → Visualize"
    steps:
      - tool: collider
        output_to: /tmp/collider_output

      - tool: purpose_field
        input_from: collider
        note: "Runs as Stage 3.7 inside Collider"

      - tool: pom
        input_from: collider
        output_to: /tmp/pom_manifest.yaml

      - tool: charts
        input_from: [collider, pom]
        output_to: /tmp/purpose_charts.html

    expected_outputs:
      - unified_analysis.json
      - pom_manifest.yaml
      - purpose_charts.html

  quick_coherence:
    name: "Quick Coherence Check"
    description: "Just measure coherence from existing data"
    steps:
      - tool: pom
        input_from: existing_unified_analysis
        output_to: /tmp/quick_coherence.yaml

    expected_outputs:
      - coherence value > 0

