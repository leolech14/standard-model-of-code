  # ---------------------------------------------------------------------------
  # Implements SMC Axiom E2 (Four Flows) and G1 (Three Observers)
  # Full spec: particle/docs/specs/DYNAMIC_OBSERVERS_IMPLEMENTATION_PLAN.md
  # Task registry: .agent/deck/DYNAMIC_OBSERVERS_REGISTRY.yaml

  runtime_ingestor:
    id: T100
    name: "Runtime Flow Ingestor"
    subsystem: PARTICLE
    realm: particle
    phase: "Dynamic Observers v2.0"
    axiom: "E2 (Runtime Flow), G1 (Operational Observer)"
    description: |
      Ingests runtime telemetry (OpenTelemetry, cProfile, py-spy) and maps to
      static AST nodes. Enriches graph with execution_count, latency, hotspots.
    invoke:
      method: cli
      command: "python3 particle/src/dynamics/runtime_ingestor.py"
    inputs:
      - name: telemetry_file
        type: file
        formats: [otlp, prof, coverage]
    outputs:
      - name: enriched_nodes
        type: json
        contains: [execution_count, avg_latency, is_hotspot, coverage_percent]
    status: planned
    dependencies: [DYN-010 through DYN-025]

  temporal_observer:
    id: T101
    name: "Temporal Observer (Git Mining)"
    subsystem: PARTICLE
    realm: particle
    phase: "Dynamic Observers v2.0"
    axiom: "E2 (Change Flow)"
    description: |
      Mines git history with PyDriller to compute temporal coupling, churn,
      and change impact prediction. Maps commits to AST nodes.
    invoke:
      method: cli
      command: "python3 particle/src/evolution/git_miner.py"
    inputs:
      - name: repo_path
        type: path
      - name: history_depth
        type: int
        default: 100
    outputs:
      - name: temporal_coupling_matrix
        type: json
      - name: churn_metrics
        type: json
    status: planned
    dependencies: [DYN-030 through DYN-036]

  social_analyzer:
    id: T102
    name: "Social Graph Analyzer"
    subsystem: OBSERVER
    realm: observer
    phase: "Dynamic Observers v2.0"
    axiom: "E2 (Human Flow)"
    description: |
      Analyzes authorship patterns, computes truck factor, detects knowledge
      islands (single-author code), validates Conway's Law alignment.
    invoke:
      method: cli
      command: "python3 particle/src/social/authorship_analyzer.py"
    outputs:
      - name: truck_factor
        type: int
      - name: knowledge_islands
        type: list
      - name: conway_alignment
        type: float
    status: planned
    dependencies: [DYN-040 through DYN-046]

  dora_metrics:
    id: T103
    name: "DORA Metrics Calculator"
    subsystem: OBSERVER
    realm: observer
    phase: "Dynamic Observers v2.0"
    axiom: "G1 (Operational Observer)"
    description: |
      Computes DORA metrics (deployment frequency, lead time, MTTR, change
