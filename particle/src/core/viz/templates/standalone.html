<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Collider v__VERSION_PLACEHOLDER__</title>
    <style>
        __STYLES_PLACEHOLDER__

        /* ═══════════════════════════════════════════════════════════════════
           COLLIDER UI - Canvas-First Layout
           ═══════════════════════════════════════════════════════════════════ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ═══════════════════════════════════════════════════════════════════
           LOADER (inline - must render before styles.css loads)
           ═══════════════════════════════════════════════════════════════════ */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--color-bg-base, #0a0a0f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: var(--z-index-modal, 9999);
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--color-text-primary, rgba(220, 220, 225, 0.9));
        }

        #loader-status {
            font-size: 11px;
            opacity: 0.5;
        }

        /* ═══════════════════════════════════════════════════════════════════
           GRAPH CONTAINER - Full viewport
           ═══════════════════════════════════════════════════════════════════ */
        #3d-graph {
            position: fixed;
            inset: 0;
        }
    </style>

    <!-- Google Fonts: Libre Baskerville for scientific-paper theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script>
        window.process = window.process || { env: { NODE_ENV: "production" } };
        window.global = window.global || window;
    </script>
    <!-- THREE.js and 3D Force Graph dependencies -->
    <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.149.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>

<body>
    <!-- Loader -->
    <div id="loader">
        <div>INITIALIZING...</div>
        <div id="loader-status">Loading data...</div>
    </div>

    <!-- Graph Container - Full viewport canvas -->
    <div id="3d-graph"></div>

    <!-- ═══════════════════════════════════════════════════════════════════
         HUD OVERLAY - All controls are transparent overlays on the canvas
         ═══════════════════════════════════════════════════════════════════ -->
    <div id="hud">

        <!-- Top Center: Stats bar (nodes, edges, entropy) -->
        <div class="hud-panel top-center">
            <div class="stat">
                <span class="stat-label">Nodes</span>
                <span class="stat-value" id="stat-nodes">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Edges</span>
                <span class="stat-value" id="stat-edges">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Entropy</span>
                <span class="stat-value" id="stat-entropy">--</span>
            </div>
        </div>

        <!-- Top Left: Target info -->
        <div class="hud-panel top-left">
            <div class="hud-title">COLLIDER <span class="hud-version">v__VERSION_PLACEHOLDER__</span></div>
            <div class="hud-target" id="target-name"></div>
            <div class="hud-timestamp" id="timestamp"></div>
        </div>

        <!-- Bottom Dock: Primary controls -->
        <div class="hud-panel bottom-dock">
            <!-- View Mode: Atoms / Files -->
            <div class="dock-group" id="dock-view-mode">
                <button class="dock-btn active" data-mode="atoms" title="Atom-level view">Atoms</button>
                <button class="dock-btn" data-mode="files" title="File-level view">Files</button>
            </div>

            <div class="dock-sep"></div>

            <!-- Color Mode -->
            <div class="dock-group" id="dock-color-mode">
                <button class="dock-btn active" data-color="tier" title="Color by tier">Tier</button>
                <button class="dock-btn" data-color="family" title="Color by family">Family</button>
                <button class="dock-btn" data-color="layer" title="Color by layer">Layer</button>
                <button class="dock-btn" data-color="ring" title="Color by ring">Ring</button>
                <button class="dock-btn" data-color="file" title="Color by file">File</button>
                <button class="dock-btn" data-color="flow" title="Color by flow">Flow</button>
            </div>

            <div class="dock-sep"></div>

            <!-- Actions -->
            <div class="dock-group" id="dock-actions">
                <button class="dock-btn" id="btn-reset" title="Reset camera">Reset</button>
                <button class="dock-btn" id="btn-screenshot" title="Screenshot">Shot</button>
                <button class="dock-btn" id="btn-freeze" title="Freeze layout">Freeze</button>
            </div>
        </div>

        <!-- Side Dock: Hover-reveal control panel (left edge) -->
        <div class="side-dock" id="side-dock">
            <div class="side-handle-row">
                <button class="side-handle" id="side-toggle" title="Toggle controls">Controls</button>
                <button class="side-lock" id="side-lock" title="Pin panel open">Pin</button>
            </div>
            <div class="side-content">
                <!-- Appearance Section -->
                <div class="side-section">
                    <div class="side-title collapsible" data-section="appearance">
                        <span class="collapse-icon">&#9662;</span> Appearance
                    </div>
                    <div class="collapsible-content" id="sec-appearance">
                        <div class="filter-row">
                            <label class="filter-label">Node Size</label>
                            <input type="range" class="slider" id="cfg-node-size" min="1" max="20" value="4" step="0.5">
                        </div>
                        <div class="filter-row">
                            <label class="filter-label">Node Opacity</label>
                            <input type="range" class="slider" id="cfg-node-opacity" min="0" max="1" value="0.85" step="0.05">
                        </div>
                        <div class="filter-row">
                            <label class="filter-label">Edge Opacity</label>
                            <input type="range" class="slider" id="cfg-edge-opacity" min="0" max="1" value="0.3" step="0.05">
                        </div>
                        <div class="filter-row">
                            <label class="filter-label">Label Size</label>
                            <input type="range" class="slider" id="cfg-label-size" min="0" max="6" value="2" step="0.5">
                        </div>
                    </div>
                </div>

                <!-- Physics Section -->
                <div class="side-section">
                    <div class="side-title collapsible collapsed" data-section="physics">
                        <span class="collapse-icon">&#9662;</span> Physics
                    </div>
                    <div class="collapsible-content collapsed" id="sec-physics">
                        <div class="filter-row">
                            <label class="filter-label">Charge</label>
                            <input type="range" class="slider" id="cfg-charge" min="-200" max="0" value="-30" step="5">
                        </div>
                        <div class="filter-row">
                            <label class="filter-label">Link Distance</label>
                            <input type="range" class="slider" id="cfg-link-distance" min="10" max="200" value="30" step="5">
                        </div>
                        <div class="filter-row">
                            <label class="filter-label">Gravity</label>
                            <input type="range" class="slider" id="cfg-gravity" min="0" max="1" value="0.1" step="0.05">
                        </div>
                        <div class="preset-grid">
                            <button class="preset-btn" data-preset="tight">Tight</button>
                            <button class="preset-btn" data-preset="spread">Spread</button>
                            <button class="preset-btn" data-preset="cluster">Cluster</button>
                            <button class="preset-btn active" data-preset="default">Default</button>
                        </div>
                    </div>
                </div>

                <!-- Filters Section -->
                <div class="side-section">
                    <div class="side-title collapsible collapsed" data-section="filters">
                        <span class="collapse-icon">&#9662;</span> Filters
                    </div>
                    <div class="collapsible-content collapsed" id="sec-filters">
                        <div class="filter-row">
                            <input type="text" class="filter-input" id="cfg-search" placeholder="Search nodes...">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- HUD Toast: Notification overlay -->
        <div class="hud-toast" id="hud-toast"></div>

    </div>
    <!-- /hud -->

    <!-- Performance HUD -->
    <div id="perf-hud">
        <div class="perf-row">
            <span class="perf-label">FPS:</span>
            <span class="perf-value" id="perf-fps">60</span>
            <span class="perf-label">Frame:</span>
            <span class="perf-value" id="perf-frame">0ms</span>
        </div>
    </div>

    <!-- Toast (legacy compat) -->
    <div id="toast"></div>

    <!-- Selection Box -->
    <div id="selection-box"></div>

    <!-- Topology Tooltip -->
    <div class="topo-tooltip" id="topo-tooltip">
        <div class="topo-tooltip-header">
            <span class="topo-tooltip-icon" id="tooltip-icon"></span>
            <div>
                <div class="topo-tooltip-title" id="tooltip-title"></div>
                <div class="topo-tooltip-subtitle" id="tooltip-subtitle"></div>
            </div>
        </div>
        <div class="topo-tooltip-body" id="tooltip-body"></div>
        <div class="topo-tooltip-theory" id="tooltip-theory"></div>
        <div class="topo-tooltip-examples" id="tooltip-examples"></div>
    </div>

    <!-- Core Application Injection -->
    <script id="collider-payload" type="application/json">__PAYLOAD_PLACEHOLDER__</script>

    <script>
        __BUNDLE_JS_PLACEHOLDER__
    </script>
</body>

</html>
