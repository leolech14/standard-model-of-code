<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Collider v{{VERSION}}</title>
    <style>
        {{STYLES}}

        /* ═══════════════════════════════════════════════════════════════════
           COLLIDER UI - Canvas-First Layout (Phase 1)
           ═══════════════════════════════════════════════════════════════════ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── Legacy CSS variable bridge ──
           These inline vars are still referenced by app.js and 54 modules.
           Phase 2 will migrate all references to the token system and remove these. */
        :root {
            --bg: #0a0a0f;
            --surface: rgba(15, 15, 22, 0.85);
            --surface-hover: rgba(25, 25, 35, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --border-accent: rgba(100, 120, 150, 0.3);
            --text: rgba(220, 220, 225, 0.9);
            --text-dim: rgba(220, 220, 225, 0.5);
            --text-muted: rgba(220, 220, 225, 0.3);
            --accent: #667788;
            --accent-dim: rgba(100, 120, 150, 0.15);
            --accent-glow: none;
            --green: #5a9a70;
            --yellow: #a09060;
            --red: #b07070;
            --cyan: #7090a0;
            --radius: 8px;
            --radius-sm: 4px;
            --glass: blur(12px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            font-size: 12px;
        }

        /* ═══════════════════════════════════════════════════════════════════
           LOADER (inline - must render before styles.css loads)
           ═══════════════════════════════════════════════════════════════════ */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--color-bg-base, #0a0a0f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: var(--z-index-modal, 9999);
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--color-text-primary, rgba(220, 220, 225, 0.9));
        }

        #loader-status {
            font-size: 11px;
            opacity: 0.5;
        }

        /* ═══════════════════════════════════════════════════════════════════
           GRAPH CONTAINER - Full viewport (Phase 1: no sidebar offsets)
           ═══════════════════════════════════════════════════════════════════ */
        #3d-graph {
            position: fixed;
            inset: 0;
        }
    </style>

    <script>
        window.process = window.process || { env: { NODE_ENV: "production" } };
        window.global = window.global || window;
    </script>
    <!-- THREE.js and 3D Force Graph dependencies -->
    <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.149.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>

<body>
    <!-- Loader -->
    <div id="loader">
        <div>INITIALIZING...</div>
        <div id="loader-status">Loading data...</div>
    </div>

    <!-- Graph Container - Full viewport canvas -->
    <div id="3d-graph"></div>

    <!-- ═══════════════════════════════════════════════════════════════════
         HUD OVERLAY - All controls are transparent overlays on the canvas
         ═══════════════════════════════════════════════════════════════════ -->
    <div id="hud">

        <!-- Top Center: Stats bar (nodes, edges, entropy) -->
        <div class="hud-panel top-center">
            <div class="stat">
                <span class="stat-label">Nodes</span>
                <span class="stat-value" id="stat-nodes">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Edges</span>
                <span class="stat-value" id="stat-edges">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Entropy</span>
                <span class="stat-value" id="stat-entropy">--</span>
            </div>
        </div>

        <!-- Top Left: Target info -->
        <div class="hud-panel top-left">
            <div class="hud-title">COLLIDER <span class="hud-version">v{{VERSION}}</span></div>
            <div class="hud-target" id="target-name"></div>
            <div class="hud-timestamp" id="timestamp"></div>
        </div>

        <!-- Bottom Dock: Primary controls -->
        <div class="hud-panel bottom-dock">
            <!-- View Mode: Atoms / Files -->
            <div class="dock-group" id="dock-view-mode">
                <button class="dock-btn active" data-mode="atoms" title="Atom-level view">Atoms</button>
                <button class="dock-btn" data-mode="files" title="File-level view">Files</button>
            </div>

            <div class="dock-sep"></div>

            <!-- Color Mode -->
            <div class="dock-group" id="dock-color-mode">
                <button class="dock-btn active" data-color="tier" title="Color by tier">Tier</button>
                <button class="dock-btn" data-color="family" title="Color by family">Family</button>
                <button class="dock-btn" data-color="layer" title="Color by layer">Layer</button>
                <button class="dock-btn" data-color="ring" title="Color by ring">Ring</button>
                <button class="dock-btn" data-color="file" title="Color by file">File</button>
                <button class="dock-btn" data-color="flow" title="Color by flow">Flow</button>
            </div>

            <div class="dock-sep"></div>

            <!-- Actions -->
            <div class="dock-group" id="dock-actions">
                <button class="dock-btn" id="btn-reset" title="Reset camera">Reset</button>
                <button class="dock-btn" id="btn-screenshot" title="Screenshot">Shot</button>
                <button class="dock-btn" id="btn-freeze" title="Freeze layout">Freeze</button>
            </div>
        </div>

        <!-- Side Dock: Hover-reveal control panel (left edge) -->
        <div class="side-dock" id="side-dock">
            <div class="side-handle-row">
                <button class="side-handle" id="side-toggle" title="Toggle controls">Controls</button>
                <button class="side-lock" id="side-lock" title="Pin panel open">Pin</button>
            </div>
            <div class="side-content">
                <!-- Appearance Section -->
                <div class="side-section">
                    <div class="side-title collapsible" data-section="appearance">
                        <span class="collapse-icon">&#9662;</span> Appearance
                    </div>
                    <div class="collapsible-content" id="sec-appearance">
                        <div class="filter-row">
                            <label class="filter-label">Node Size</label>
                            <input type="range" class="slider" id="cfg-node-size" min="1" max="20" value="4" step="0.5">
                        </div>
                        <div class="filter-row">
                            <label class="filter-label">Node Opacity</label>
                            <input type="range" class="slider" id="cfg-node-opacity" min="0" max="1" value="0.85" step="0.05">
                        </div>
                        <div class="filter-row">
                            <label class="filter-label">Edge Opacity</label>
                            <input type="range" class="slider" id="cfg-edge-opacity" min="0" max="1" value="0.3" step="0.05">
                        </div>
                        <div class="filter-row">
                            <label class="filter-label">Label Size</label>
                            <input type="range" class="slider" id="cfg-label-size" min="0" max="6" value="2" step="0.5">
                        </div>
                    </div>
                </div>

                <!-- Physics Section -->
                <div class="side-section">
                    <div class="side-title collapsible collapsed" data-section="physics">
                        <span class="collapse-icon">&#9662;</span> Physics
                    </div>
                    <div class="collapsible-content collapsed" id="sec-physics">
                        <div class="filter-row">
                            <label class="filter-label">Charge</label>
                            <input type="range" class="slider" id="cfg-charge" min="-200" max="0" value="-30" step="5">
                        </div>
                        <div class="filter-row">
                            <label class="filter-label">Link Distance</label>
                            <input type="range" class="slider" id="cfg-link-distance" min="10" max="200" value="30" step="5">
                        </div>
                        <div class="filter-row">
                            <label class="filter-label">Gravity</label>
                            <input type="range" class="slider" id="cfg-gravity" min="0" max="1" value="0.1" step="0.05">
                        </div>
                        <div class="preset-grid">
                            <button class="preset-btn" data-preset="tight">Tight</button>
                            <button class="preset-btn" data-preset="spread">Spread</button>
                            <button class="preset-btn" data-preset="cluster">Cluster</button>
                            <button class="preset-btn active" data-preset="default">Default</button>
                        </div>
                    </div>
                </div>

                <!-- Filters Section -->
                <div class="side-section">
                    <div class="side-title collapsible collapsed" data-section="filters">
                        <span class="collapse-icon">&#9662;</span> Filters
                    </div>
                    <div class="collapsible-content collapsed" id="sec-filters">
                        <div class="filter-row">
                            <input type="text" class="filter-input" id="cfg-search" placeholder="Search nodes...">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- HUD Toast: Notification overlay -->
        <div class="hud-toast" id="hud-toast"></div>

    </div>
    <!-- /hud -->

    <!-- Performance HUD -->
    <div id="perf-hud">
        <div class="perf-row">
            <span class="perf-label">FPS:</span>
            <span class="perf-value" id="perf-fps">60</span>
            <span class="perf-label">Frame:</span>
            <span class="perf-value" id="perf-frame">0ms</span>
        </div>
    </div>

    <!-- Toast (legacy compat) -->
    <div id="toast"></div>

    <!-- Selection Box -->
    <div id="selection-box"></div>

    <!-- Topology Tooltip -->
    <div class="topo-tooltip" id="topo-tooltip">
        <div class="topo-tooltip-header">
            <span class="topo-tooltip-icon" id="tooltip-icon"></span>
            <div>
                <div class="topo-tooltip-title" id="tooltip-title"></div>
                <div class="topo-tooltip-subtitle" id="tooltip-subtitle"></div>
            </div>
        </div>
        <div class="topo-tooltip-body" id="tooltip-body"></div>
        <div class="topo-tooltip-theory" id="tooltip-theory"></div>
        <div class="topo-tooltip-examples" id="tooltip-examples"></div>
    </div>

    <!-- INLINED MODULES FOR GENERATED REPORTS -->
    <script>
        /**
         * @module HardwareInfo
         * (Inlined for standalone report generation)
         */
        const HardwareInfo = (function () {
            'use strict';
            let _info = null;

            function getInfo() {
                if (_info) return _info;
                _info = {
                    gpu: 'Unknown GPU', vendor: 'Unknown Vendor', renderer: 'Unknown Renderer',
                    memory: { jsHeapSizeLimit: 0, totalJSHeapSize: 0, usedJSHeapSize: 0 },
                    limits: { maxTextureSize: 0, maxCubeMapSize: 0, maxRenderBufferSize: 0 },
                    context: 'webgl'
                };
                if (performance && performance.memory) _updateMemory();

                try {
                    const canvas = document.createElement('canvas');
                    let gl = canvas.getContext('webgl');
                    if (!gl) { gl = canvas.getContext('experimental-webgl'); _info.context = 'experimental-webgl'; }
                    else { _info.context = 'webgl'; }
                    const gl2 = canvas.getContext('webgl2');
                    if (gl2) { gl = gl2; _info.context = 'webgl2'; }

                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        if (debugInfo) {
                            _info.vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                            _info.renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                            _info.gpu = _info.renderer;
                        } else {
                            _info.renderer = gl.getParameter(gl.RENDERER);
                            _info.vendor = gl.getParameter(gl.VENDOR);
                        }
                        _info.limits.maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
                        _info.limits.maxCubeMapSize = gl.getParameter(gl.MAX_CUBE_MAP_TEXTURE_SIZE);
                        _info.limits.maxRenderBufferSize = gl.getParameter(gl.MAX_RENDERBUFFER_SIZE);
                    }
                } catch (e) { console.warn('[HardwareInfo] Failed to detect GPU:', e); }
                return _info;
            }

            function _updateMemory() {
                if (performance && performance.memory) {
                    _info.memory.jsHeapSizeLimit = performance.memory.jsHeapSizeLimit;
                    _info.memory.totalJSHeapSize = performance.memory.totalJSHeapSize;
                    _info.memory.usedJSHeapSize = performance.memory.usedJSHeapSize;
                }
            }

            return { get: getInfo, refresh: function () { _updateMemory(); return _info; } };
        })();
        if (typeof window !== 'undefined') window.HardwareInfo = HardwareInfo;
    </script>

    <script>
        /**
         * @module ControlRegistry
         * (Inlined for standalone report generation)
         */
        const ControlRegistry = (function () {
            'use strict';
            const STORAGE_KEY = 'collider_control_settings_v2';
            const MOUSE_BUTTONS = { LEFT: 0, MIDDLE: 1, RIGHT: 2 };
            const ACTIONS = { ROTATE: 0, DOLLY: 1, PAN: 2 };

            const DEFAULTS = {
                mouse: { LEFT: 2, MIDDLE: 1, RIGHT: 0 },
                damping: { enabled: true, factor: 0.1 },
                speed: { rotate: 1.0, zoom: 1.2, pan: 1.0 }
            };

            let currentConfig = loadSettings();

            function loadSettings() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        return {
                            mouse: { ...DEFAULTS.mouse, ...(parsed.mouse || {}) },
                            damping: { ...DEFAULTS.damping, ...(parsed.damping || {}) },
                            speed: { ...DEFAULTS.speed, ...(parsed.speed || {}) }
                        };
                    }
                } catch (e) {
                    console.warn('[ControlRegistry] Failed to load settings:', e);
                }
                return JSON.parse(JSON.stringify(DEFAULTS));
            }

            function saveSettings() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(currentConfig));
                    window.dispatchEvent(new CustomEvent('controls-updated', { detail: currentConfig }));
                } catch (e) {
                    console.error('[ControlRegistry] Failed to save settings:', e);
                }
            }

            return {
                getMapping: function () {
                    return {
                        LEFT: currentConfig.mouse.LEFT,
                        MIDDLE: currentConfig.mouse.MIDDLE,
                        RIGHT: currentConfig.mouse.RIGHT
                    };
                },
                getConfig: function () { return JSON.parse(JSON.stringify(currentConfig)); },
                updateMapping: function (button, actionId) {
                    if (currentConfig.mouse[button] !== undefined) {
                        currentConfig.mouse[button] = parseInt(actionId);
                        saveSettings();
                        console.log(`[ControlRegistry] Updated ${button} to Action ${actionId}`);
                    }
                },
                resetDefaults: function () {
                    currentConfig = JSON.parse(JSON.stringify(DEFAULTS));
                    saveSettings();
                },
                CONSTANTS: {
                    MOUSE_BUTTONS,
                    ACTIONS,
                    ACTION_LABELS: { 0: 'Rotate', 1: 'Zoom (Dolly)', 2: 'Pan' }
                }
            };
        })();
        if (typeof window !== 'undefined') window.ControlRegistry = ControlRegistry;
    </script>

    <script>
        /**
         * @module SettingsPanel
         * (Inlined for standalone report generation)
         * Modified for Phase 1: attaches toggle to dock-actions instead of sidebar section-actions
         */
        const SettingsPanel = (function () {
            'use strict';
            let container = null;
            let isVisible = false;

            function init() {
                if (container) {
                    console.log('[SettingsPanel] Already initialized.');
                    return;
                }

                console.log('[SettingsPanel] Initializing...');
                createPanel();
                createToggleButton();
                window.addEventListener('controls-updated', () => {
                    if (isVisible) refreshUI();
                });
                return true;
            }

            function createToggleButton() {
                // Phase 1: Try HUD dock-actions first, then fall back to legacy section-actions
                const dockActions = document.getElementById('dock-actions');
                const actionsSection = document.getElementById('section-actions');
                const target = dockActions || actionsSection;

                if (!target) {
                    console.warn('[SettingsPanel] No actions container found for settings button');
                    return;
                }

                const btn = document.createElement('button');
                btn.className = dockActions ? 'dock-btn' : 'btn';
                btn.textContent = 'Settings';
                btn.onclick = togglePanel;
                btn.title = 'Configure Controls & Settings';

                if (dockActions) {
                    dockActions.appendChild(btn);
                } else {
                    let contentDiv = actionsSection.querySelector('.section-content') || actionsSection;
                    const grid = contentDiv.querySelector('.btn-grid');
                    if (grid) {
                        grid.appendChild(btn);
                    } else {
                        contentDiv.appendChild(btn);
                    }
                }
            }

            function createPanel() {
                container = document.createElement('div');
                container.id = 'settings-panel';
                container.style.display = 'none';
                container.style.position = 'fixed';
                container.style.top = '50%';
                container.style.left = '50%';
                container.style.transform = 'translate(-50%, -50%)';
                container.style.backgroundColor = 'rgba(20, 20, 25, 0.95)';
                container.style.border = '1px solid #444';
                container.style.borderRadius = '8px';
                container.style.padding = '20px';
                container.style.zIndex = '100000';
                container.style.width = '400px';
                container.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
                container.style.color = '#eee';
                container.style.fontFamily = 'sans-serif';

                const header = document.createElement('div');
                header.style.display = 'flex';
                header.style.justifyContent = 'space-between';
                header.style.alignItems = 'center';
                header.style.marginBottom = '20px';
                header.style.borderBottom = '1px solid #444';
                header.style.paddingBottom = '10px';

                const title = document.createElement('h2');
                title.innerText = 'Settings';
                title.style.margin = '0';
                title.style.fontSize = '18px';

                const closeBtn = document.createElement('button');
                closeBtn.innerText = '\u00d7';
                closeBtn.style.background = 'none';
                closeBtn.style.border = 'none';
                closeBtn.style.color = '#fff';
                closeBtn.style.fontSize = '24px';
                closeBtn.style.cursor = 'pointer';
                closeBtn.onclick = hidePanel;

                header.appendChild(title);
                header.appendChild(closeBtn);
                container.appendChild(header);

                const content = document.createElement('div');
                content.id = 'settings-content';
                container.appendChild(content);

                const footer = document.createElement('div');
                footer.style.marginTop = '20px';
                footer.style.display = 'flex';
                footer.style.justifyContent = 'flex-end';
                footer.style.gap = '10px';

                const resetBtn = document.createElement('button');
                resetBtn.innerText = 'Reset Defaults';
                resetBtn.style.padding = '8px 12px';
                resetBtn.style.background = '#444';
                resetBtn.style.color = '#fff';
                resetBtn.style.border = 'none';
                resetBtn.style.borderRadius = '4px';
                resetBtn.style.cursor = 'pointer';
                resetBtn.onclick = () => {
                    if (confirm('Reset all navigation controls to default?')) {
                        ControlRegistry.resetDefaults();
                        refreshUI();
                    }
                };

                const saveBtn = document.createElement('button');
                saveBtn.innerText = 'Done';
                saveBtn.style.padding = '8px 16px';
                saveBtn.style.background = '#2196F3';
                saveBtn.style.color = '#fff';
                saveBtn.style.border = 'none';
                saveBtn.style.borderRadius = '4px';
                saveBtn.style.cursor = 'pointer';
                saveBtn.onclick = hidePanel;

                footer.appendChild(resetBtn);
                footer.appendChild(saveBtn);
                container.appendChild(footer);

                document.body.appendChild(container);
            }

            function refreshUI() {
                const content = document.getElementById('settings-content');
                content.innerHTML = '';

                const section = document.createElement('div');
                section.innerHTML = '<h3 style="margin-top:0; font-size:14px; color:#aaa; text-transform:uppercase;">Navigation Controls</h3>';

                const config = ControlRegistry.getConfig();
                const { ACTIONS, ACTION_LABELS } = ControlRegistry.CONSTANTS;

                ['LEFT', 'MIDDLE', 'RIGHT'].forEach(btn => {
                    const row = document.createElement('div');
                    row.style.display = 'flex';
                    row.style.justifyContent = 'space-between';
                    row.style.alignItems = 'center';
                    row.style.marginBottom = '10px';

                    const label = document.createElement('label');
                    label.innerText = `${btn} Mouse Button:`;
                    label.style.fontSize = '14px';

                    const select = document.createElement('select');
                    select.style.padding = '4px';
                    select.style.background = '#222';
                    select.style.color = '#ddd';
                    select.style.border = '1px solid #555';
                    select.style.borderRadius = '4px';

                    Object.keys(ACTIONS).forEach(actionKey => {
                        const actionId = ACTIONS[actionKey];
                        const opt = document.createElement('option');
                        opt.value = actionId;
                        opt.innerText = ACTION_LABELS[actionId];
                        if (config.mouse[btn] === actionId) opt.selected = true;
                        select.appendChild(opt);
                    });

                    select.onchange = (e) => { ControlRegistry.updateMapping(btn, parseInt(e.target.value)); };
                    row.appendChild(label);
                    row.appendChild(select);
                    section.appendChild(row);
                });
                content.appendChild(section);

                const hint = document.createElement('div');
                hint.style.fontSize = '12px';
                hint.style.color = '#888';
                hint.style.marginTop = '10px';
                hint.innerText = 'Tip: Changes apply immediately.';
                content.appendChild(hint);
            }

            function togglePanel() { isVisible ? hidePanel() : showPanel(); }
            function showPanel() { refreshUI(); container.style.display = 'block'; isVisible = true; }
            function hidePanel() { container.style.display = 'none'; isVisible = false; }

            return { init, toggle: togglePanel };
        })();
        if (typeof window !== 'undefined') window.SettingsPanel = SettingsPanel;
    </script>

    <script>
        {{APP_JS}}
    </script>
</body>

</html>
