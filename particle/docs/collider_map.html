<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COLLIDER ARCHITECTURE MAP -- Standard Model of Code</title>
<style>
/* ============================================================
   ROOT & VARIABLES
   ============================================================ */
:root {
  --bg-primary: hsl(240 30% 4%);
  --bg-secondary: hsl(240 20% 8%);
  --bg-tertiary: hsl(240 15% 12%);
  --glass-bg: hsla(0 0% 100% / 0.03);
  --glass-bg-hover: hsla(0 0% 100% / 0.06);
  --glass-border: hsla(0 0% 100% / 0.08);
  --glass-border-hover: hsla(0 0% 100% / 0.15);

  /* Phase colors -- HSL for glow/transparency manipulation */
  --color-discovery: hsl(185 100% 50%);
  --color-extraction: hsl(215 90% 60%);
  --color-enrichment: hsl(250 70% 60%);
  --color-analysis: hsl(275 70% 60%);
  --color-intelligence: hsl(310 80% 60%);
  --color-synthesis: hsl(30 95% 55%);
  --color-output: hsl(155 80% 50%);

  --text-primary: hsl(0 0% 95%);
  --text-secondary: hsl(240 5% 60%);
  --text-muted: hsl(240 5% 40%);
  --bus-color: hsl(50 90% 55%);

  --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-med: 300ms cubic-bezier(0.4, 0, 0.2, 1);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* Subtle grid pattern overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(hsla(0 0% 100% / 0.02) 1px, transparent 1px),
    linear-gradient(90deg, hsla(0 0% 100% / 0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Radial glow behind pipeline */
body::after {
  content: '';
  position: fixed;
  top: 35%;
  left: 50%;
  width: 120%;
  height: 60%;
  transform: translate(-50%, -50%);
  background: radial-gradient(ellipse, hsla(240 60% 30% / 0.15) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ============================================================
   HEADER
   ============================================================ */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: hsla(240 30% 4% / 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--glass-border);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: linear-gradient(135deg, hsl(185 100% 50%), hsl(275 70% 60%));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 8px hsla(0 0% 0% / 0.3);
}

.header h1 {
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: linear-gradient(90deg, hsl(185 100% 70%), hsl(275 70% 75%), hsl(30 95% 70%));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header .subtitle {
  font-size: 0.75rem;
  color: var(--text-secondary);
  letter-spacing: 0.05em;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.zoom-controls {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  padding: 2px;
}

.zoom-btn {
  width: 32px;
  height: 28px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 1rem;
  cursor: pointer;
  border-radius: 6px;
  transition: var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}

.zoom-btn:hover {
  background: var(--glass-bg-hover);
  color: var(--text-primary);
}

.zoom-level {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-secondary);
  min-width: 40px;
  text-align: center;
}

.reset-btn {
  padding: 5px 12px;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  color: var(--text-secondary);
  font-size: 0.72rem;
  border-radius: 6px;
  cursor: pointer;
  transition: var(--transition-fast);
  font-family: var(--font-mono);
}

.reset-btn:hover {
  background: var(--glass-bg-hover);
  color: var(--text-primary);
  border-color: var(--glass-border-hover);
}

/* ============================================================
   CANVAS CONTAINER (pannable, zoomable)
   ============================================================ */
.canvas-container {
  position: fixed;
  inset: 0;
  top: 56px;
  overflow: hidden;
  cursor: grab;
  z-index: 1;
}

.canvas-container:active { cursor: grabbing; }

.canvas {
  position: absolute;
  width: 2400px;
  height: 1500px;
  transform-origin: 0 0;
  will-change: transform;
}

/* ============================================================
   GLASS CARD MIXIN
   ============================================================ */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  transition: var(--transition-med);
}

.glass:hover {
  background: var(--glass-bg-hover);
  border-color: var(--glass-border-hover);
}

/* ============================================================
   PHASE COLUMNS
   ============================================================ */
.phase {
  position: absolute;
  border-radius: 14px;
  padding: 14px 12px 12px;
  cursor: pointer;
  transition: var(--transition-med);
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  border: 1px solid var(--glass-border);
}

.phase::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 14px;
  opacity: 0;
  transition: opacity var(--transition-med);
  pointer-events: none;
  z-index: -1;
}

.phase:hover::before { opacity: 1; }

.phase.expanded {
  z-index: 10;
}

.phase-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  user-select: none;
}

.phase-number {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
  letter-spacing: 0.05em;
}

.phase-title {
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.phase-stage-range {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  margin-left: auto;
}

.phase-expand-icon {
  font-size: 0.7rem;
  color: var(--text-muted);
  transition: transform var(--transition-fast);
  margin-left: 4px;
}

.phase.expanded .phase-expand-icon {
  transform: rotate(180deg);
}

/* Stage list inside phases */
.stage-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.phase.expanded .stage-list {
  max-height: 600px;
}

.stage-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 6px;
  font-size: 0.72rem;
  transition: var(--transition-fast);
  cursor: default;
  position: relative;
}

.stage-item:hover {
  background: hsla(0 0% 100% / 0.04);
}

.stage-number {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  min-width: 32px;
  text-align: right;
  font-weight: 600;
  opacity: 0.8;
}

.stage-label {
  flex: 1;
  line-height: 1.3;
}

.stage-detail {
  font-size: 0.62rem;
  color: var(--text-muted);
  font-style: italic;
}

/* Phase color variants */
.phase--discovery { border-color: hsla(185 100% 50% / 0.25); }
.phase--discovery::before { box-shadow: 0 0 30px hsla(185 100% 50% / 0.12), inset 0 0 30px hsla(185 100% 50% / 0.04); }
.phase--discovery .phase-number { background: hsla(185 100% 50% / 0.15); color: var(--color-discovery); }
.phase--discovery .phase-title { color: var(--color-discovery); }
.phase--discovery .stage-number { color: var(--color-discovery); }
.phase--discovery.expanded { border-color: hsla(185 100% 50% / 0.4); box-shadow: 0 0 40px hsla(185 100% 50% / 0.08); }

.phase--extraction { border-color: hsla(215 90% 60% / 0.25); }
.phase--extraction::before { box-shadow: 0 0 30px hsla(215 90% 60% / 0.12), inset 0 0 30px hsla(215 90% 60% / 0.04); }
.phase--extraction .phase-number { background: hsla(215 90% 60% / 0.15); color: var(--color-extraction); }
.phase--extraction .phase-title { color: var(--color-extraction); }
.phase--extraction .stage-number { color: var(--color-extraction); }
.phase--extraction.expanded { border-color: hsla(215 90% 60% / 0.4); box-shadow: 0 0 40px hsla(215 90% 60% / 0.08); }

.phase--enrichment { border-color: hsla(250 70% 60% / 0.25); }
.phase--enrichment::before { box-shadow: 0 0 30px hsla(250 70% 60% / 0.12), inset 0 0 30px hsla(250 70% 60% / 0.04); }
.phase--enrichment .phase-number { background: hsla(250 70% 60% / 0.15); color: var(--color-enrichment); }
.phase--enrichment .phase-title { color: var(--color-enrichment); }
.phase--enrichment .stage-number { color: var(--color-enrichment); }
.phase--enrichment.expanded { border-color: hsla(250 70% 60% / 0.4); box-shadow: 0 0 40px hsla(250 70% 60% / 0.08); }

.phase--analysis { border-color: hsla(275 70% 60% / 0.25); }
.phase--analysis::before { box-shadow: 0 0 30px hsla(275 70% 60% / 0.12), inset 0 0 30px hsla(275 70% 60% / 0.04); }
.phase--analysis .phase-number { background: hsla(275 70% 60% / 0.15); color: var(--color-analysis); }
.phase--analysis .phase-title { color: var(--color-analysis); }
.phase--analysis .stage-number { color: var(--color-analysis); }
.phase--analysis.expanded { border-color: hsla(275 70% 60% / 0.4); box-shadow: 0 0 40px hsla(275 70% 60% / 0.08); }

.phase--intelligence { border-color: hsla(310 80% 60% / 0.25); }
.phase--intelligence::before { box-shadow: 0 0 30px hsla(310 80% 60% / 0.12), inset 0 0 30px hsla(310 80% 60% / 0.04); }
.phase--intelligence .phase-number { background: hsla(310 80% 60% / 0.15); color: var(--color-intelligence); }
.phase--intelligence .phase-title { color: var(--color-intelligence); }
.phase--intelligence .stage-number { color: var(--color-intelligence); }
.phase--intelligence.expanded { border-color: hsla(310 80% 60% / 0.4); box-shadow: 0 0 40px hsla(310 80% 60% / 0.08); }

.phase--synthesis { border-color: hsla(30 95% 55% / 0.25); }
.phase--synthesis::before { box-shadow: 0 0 30px hsla(30 95% 55% / 0.12), inset 0 0 30px hsla(30 95% 55% / 0.04); }
.phase--synthesis .phase-number { background: hsla(30 95% 55% / 0.15); color: var(--color-synthesis); }
.phase--synthesis .phase-title { color: var(--color-synthesis); }
.phase--synthesis .stage-number { color: var(--color-synthesis); }
.phase--synthesis.expanded { border-color: hsla(30 95% 55% / 0.4); box-shadow: 0 0 40px hsla(30 95% 55% / 0.08); }

.phase--output { border-color: hsla(155 80% 50% / 0.25); }
.phase--output::before { box-shadow: 0 0 30px hsla(155 80% 50% / 0.12), inset 0 0 30px hsla(155 80% 50% / 0.04); }
.phase--output .phase-number { background: hsla(155 80% 50% / 0.15); color: var(--color-output); }
.phase--output .phase-title { color: var(--color-output); }
.phase--output .stage-number { color: var(--color-output); }
.phase--output.expanded { border-color: hsla(155 80% 50% / 0.4); box-shadow: 0 0 40px hsla(155 80% 50% / 0.08); }

/* ============================================================
   PIPELINE CONTEXT BUS
   ============================================================ */
.pipeline-bus {
  position: absolute;
  height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
  border: 1px solid hsla(50 90% 55% / 0.25);
  background: hsla(50 90% 55% / 0.04);
  color: var(--bus-color);
  overflow: hidden;
}

.pipeline-bus::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, hsla(50 90% 55% / 0.08), transparent);
  animation: busFlow 4s linear infinite;
}

@keyframes busFlow {
  0% { left: -50%; }
  100% { left: 100%; }
}

/* ============================================================
   ENTRY POINTS (left side)
   ============================================================ */
.entry-group {
  position: absolute;
}

.entry-group-title {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
  padding-left: 4px;
}

.entry-node {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 0.72rem;
  margin-bottom: 4px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  transition: var(--transition-fast);
  cursor: default;
  position: relative;
}

.entry-node:hover {
  background: var(--glass-bg-hover);
  border-color: hsla(185 100% 50% / 0.3);
}

.entry-icon {
  font-size: 0.7rem;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  background: hsla(185 100% 50% / 0.1);
  color: var(--color-discovery);
  font-family: var(--font-mono);
  font-weight: 700;
}

.entry-label {
  color: var(--text-primary);
  font-weight: 500;
}

.entry-path {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
}

.entry-badge {
  font-size: 0.55rem;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 600;
  letter-spacing: 0.04em;
  margin-left: auto;
}

.entry-badge--primary {
  background: hsla(185 100% 50% / 0.15);
  color: var(--color-discovery);
}

.entry-badge--secondary {
  background: hsla(0 0% 100% / 0.05);
  color: var(--text-muted);
}

/* ============================================================
   OUTPUT ARTIFACTS (right side)
   ============================================================ */
.output-group {
  position: absolute;
}

.output-group-title {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
  padding-left: 4px;
}

.output-node {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 0.7rem;
  margin-bottom: 3px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  transition: var(--transition-fast);
  cursor: default;
}

.output-node:hover {
  background: var(--glass-bg-hover);
  border-color: hsla(155 80% 50% / 0.3);
}

.output-icon {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

.output-name {
  font-family: var(--font-mono);
  font-weight: 500;
  color: var(--color-output);
}

.output-desc {
  color: var(--text-muted);
  font-size: 0.6rem;
}

/* ============================================================
   WAVE CONSUMERS (bottom)
   ============================================================ */
.wave-section {
  position: absolute;
}

.wave-title {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.wave-title-badge {
  font-size: 0.55rem;
  padding: 1px 6px;
  border-radius: 3px;
  background: hsla(275 70% 60% / 0.15);
  color: hsl(275 70% 70%);
  font-weight: 600;
}

.wave-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}

.wave-node {
  padding: 6px 8px;
  border-radius: 8px;
  font-size: 0.66rem;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  transition: var(--transition-fast);
  cursor: default;
}

.wave-node:hover {
  background: var(--glass-bg-hover);
  border-color: hsla(275 70% 60% / 0.3);
}

.wave-node-name {
  font-family: var(--font-mono);
  font-weight: 500;
  color: hsl(275 70% 75%);
  font-size: 0.64rem;
}

.wave-node-desc {
  color: var(--text-muted);
  font-size: 0.58rem;
  margin-top: 2px;
  line-height: 1.3;
}

/* ============================================================
   EXTERNAL DEPENDENCIES (floating badges)
   ============================================================ */
.ext-deps {
  position: absolute;
}

.ext-deps-title {
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.ext-badge-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.ext-badge {
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 0.6rem;
  font-family: var(--font-mono);
  background: hsla(0 0% 100% / 0.03);
  border: 1px solid hsla(0 0% 100% / 0.06);
  color: var(--text-secondary);
  transition: var(--transition-fast);
  cursor: default;
}

.ext-badge:hover {
  border-color: hsla(0 0% 100% / 0.15);
  color: var(--text-primary);
}

.ext-dot {
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}

/* ============================================================
   CONNECTION LINES (SVG)
   ============================================================ */
.connections-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.conn-line {
  fill: none;
  stroke-width: 1.5;
  opacity: 0.35;
  transition: opacity var(--transition-fast);
}

.conn-line--active {
  opacity: 0.7;
  stroke-width: 2;
}

.conn-arrowhead {
  opacity: 0.5;
}

/* ============================================================
   LEGEND
   ============================================================ */
.legend {
  position: fixed;
  bottom: 16px;
  left: 16px;
  z-index: 100;
  padding: 12px 16px;
  background: hsla(240 30% 4% / 0.9);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.62rem;
  color: var(--text-secondary);
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 3px;
  flex-shrink: 0;
}

.legend-separator {
  width: 1px;
  height: 16px;
  background: var(--glass-border);
}

/* ============================================================
   TOOLTIP
   ============================================================ */
.tooltip {
  position: fixed;
  z-index: 200;
  max-width: 320px;
  padding: 10px 14px;
  background: hsla(240 20% 8% / 0.95);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border-hover);
  border-radius: 8px;
  font-size: 0.72rem;
  line-height: 1.5;
  color: var(--text-primary);
  pointer-events: none;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.15s, transform 0.15s;
  box-shadow: 0 8px 32px hsla(0 0% 0% / 0.5);
}

.tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}

.tooltip-title {
  font-weight: 600;
  margin-bottom: 4px;
  font-size: 0.78rem;
}

.tooltip-stage {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  opacity: 0.6;
}

.tooltip-body {
  color: var(--text-secondary);
  font-size: 0.68rem;
}

/* ============================================================
   MINI-MAP
   ============================================================ */
.minimap {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 100;
  width: 180px;
  height: 110px;
  background: hsla(240 30% 4% / 0.9);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  overflow: hidden;
}

.minimap-content {
  position: relative;
  width: 100%;
  height: 100%;
}

.minimap-viewport {
  position: absolute;
  border: 1px solid hsla(185 100% 50% / 0.5);
  background: hsla(185 100% 50% / 0.05);
  border-radius: 2px;
  pointer-events: none;
}

.minimap-dot {
  position: absolute;
  width: 3px;

// ---- Phase columns ----
function renderPhases() {

    el.className = `phase phase--${phase.id}`;

    el.style.left = pos.x + 'px';
    el.style.top = pos.y + 'px';
    el.style.width = pos.w + 'px';

    // Header
    const header = document.createElement('div');
    header.className = 'phase-header';
    header.innerHTML = `
      <span class="phase-number">${phase.id === 'discovery' ? '1' : phase.id === 'extraction' ? '2' : phase.id === 'enrichment' ? '3' : phase.id === 'analysis' ? '4' : phase.id === 'intelligence' ? '5' : phase.id === 'synthesis' ? '6' : '7'}</span>
      <span class="phase-title">${phase.label}</span>
      <span class="phase-stage-range">${phase.stageRange}</span>
      <span class="phase-expand-icon">&#9662;</span>
    `;
    el.appendChild(header);

    // Stage list
    const stageList = document.createElement('div');
    stageList.className = 'stage-list';

    phase.stages.forEach(stage => {
      const item = document.createElement('div');
      item.className = 'stage-item';
      item.setAttribute('data-tooltip', `Stage ${stage.num}: ${stage.label}`);
      item.setAttribute('data-tooltip-stage', `Stage ${stage.num}  |  ${stage.file}`);
      item.setAttribute('data-tooltip-body', stage.detail);
      item.innerHTML = `
        <span class="stage-number">${stage.num}</span>
        <span class="stage-label">${stage.label}</span>
      `;
      stageList.appendChild(item);
    });

    el.appendChild(stageList);

    // Click to expand
    header.addEventListener('click', () => {
      const wasExpanded = el.classList.contains('expanded');
      // Collapse others
      document.querySelectorAll('.phase.expanded').forEach(p => p.classList.remove('expanded'));
      if (!wasExpanded) {
        el.classList.add('expanded');
      }
    });

    canvas.appendChild(el);

// ---- SVG Connections ----
function renderConnections() {
  const ns = 'http://www.w3.org/2000/svg';
  svgEl.innerHTML = '';

  // Defs for arrowheads
  const defs = document.createElementNS(ns, 'defs');

  const colors = {
    entry: 'hsl(185, 100%, 50%)',
    phase: 'hsl(0, 0%, 40%)',
    output: 'hsl(155, 80%, 50%)',
    wave: 'hsl(275, 70%, 60%)',
    bus: 'hsl(50, 90%, 55%)',
  };

  Object.entries(colors).forEach(([id, color]) => {
    const marker = document.createElementNS(ns, 'marker');
    marker.setAttribute('id', `arrow-${id}`);
    marker.setAttribute('viewBox', '0 0 10 6');
    marker.setAttribute('refX', '10');
    marker.setAttribute('refY', '3');
    marker.setAttribute('markerWidth', '8');
    marker.setAttribute('markerHeight', '6');
    marker.setAttribute('orient', 'auto');
    const poly = document.createElementNS(ns, 'polygon');
    poly.setAttribute('points', '0,0 10,3 0,6');
    poly.setAttribute('fill', color);
    poly.setAttribute('class', 'conn-arrowhead');
    marker.appendChild(poly);
    defs.appendChild(marker);
  });

  svgEl.appendChild(defs);

  // Entry points -> first phase
  const entryX = LAYOUT.entryPoints.x + 270;
  const firstPhaseX = LAYOUT.phases.discovery.x;
  ENTRY_POINTS.forEach((_, i) => {
    const y = LAYOUT.entryPoints.y + 30 + i * 43;
    const targetY = LAYOUT.pipelineBus.y + 16;
    drawCurve(ns, entryX, y, firstPhaseX - 10, targetY, colors.entry, 'arrow-entry');
  });

  // Phase-to-phase arrows (along the bus)
  const phaseIds = ['discovery', 'extraction', 'enrichment', 'analysis', 'intelligence', 'synthesis', 'output'];
  for (let i = 0; i < phaseIds.length - 1; i++) {
    const from = LAYOUT.phases[phaseIds[i]];
    const to = LAYOUT.phases[phaseIds[i + 1]];
    const y = LAYOUT.pipelineBus.y + 16;
    drawArrow(ns, from.x + from.w + 2, y, to.x - 2, y, colors.phase, 'arrow-phase');
  }

  // Bus drop-down lines to each phase
  phaseIds.forEach(pid => {
    const p = LAYOUT.phases[pid];
    const busY = LAYOUT.pipelineBus.y + 32;
    const phaseY = p.y;
    const cx = p.x + p.w / 2;
    drawLine(ns, cx, busY, cx, phaseY, colors.bus, 0.15);
  });

  // Last phase -> output artifacts
  const lastPhase = LAYOUT.phases.output;
  const outX = LAYOUT.outputArtifacts.x;
  OUTPUT_ARTIFACTS.forEach((_, i) => {
    const y = LAYOUT.outputArtifacts.y + 30 + i * 32;
    const fromX = lastPhase.x + lastPhase.w;
    const fromY = lastPhase.y + 40;
    drawCurve(ns, fromX, fromY, outX, y, colors.output, 'arrow-output');
  });

  // Wave consumer connections from bus
  const waveY = LAYOUT.waveSection.y;
  const busBottom = LAYOUT.pipelineBus.y + 32;
  for (let i = 0; i < 4; i++) {
    const x = LAYOUT.waveSection.x + 125 + i * 250;
    drawLine(ns, x, busBottom + 480, x, waveY, colors.wave, 0.12);
  }
}

function drawLine(ns, x1, y1, x2, y2, color, opacity) {
  const line = document.createElementNS(ns, 'line');
  line.setAttribute('x1', x1);
  line.setAttribute('y1', y1);
  line.setAttribute('x2', x2);
  line.setAttribute('y2', y2);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', '1');
  line.setAttribute('opacity', opacity || 0.3);
  line.setAttribute('stroke-dasharray', '4,4');
  svgEl.appendChild(line);
}

function drawArrow(ns, x1, y1, x2, y2, color, markerEnd) {
  const line = document.createElementNS(ns, 'line');
  line.setAttribute('x1', x1);
  line.setAttribute('y1', y1);
  line.setAttribute('x2', x2);
  line.setAttribute('y2', y2);
  line.setAttribute('stroke', color);
  line.setAttribute('class', 'conn-line');
  if (markerEnd) line.setAttribute('marker-end', `url(#${markerEnd})`);
  svgEl.appendChild(line);
}

function drawCurve(ns, x1, y1, x2, y2, color, markerEnd) {
  const path = document.createElementNS(ns, 'path');
  const dx = (x2 - x1) * 0.4;
  const d = `M${x1},${y1} C${x1 + dx},${y1} ${x2 - dx},${y2} ${x2},${y2}`;
  path.setAttribute('d', d);
  path.setAttribute('stroke', color);
  path.setAttribute('class', 'conn-line');
  if (markerEnd) path.setAttribute('marker-end', `url(#${markerEnd})`);
  svgEl.appendChild(path);
}

// ================================================================
// TOOLTIP SYSTEM
// ================================================================

canvas.addEventListener('mouseover', (e) => {
  const target = e.target.closest('[data-tooltip]');
  if (!target) return;

  tooltipTitle.textContent = target.getAttribute('data-tooltip') || '';
  tooltipStage.textContent = target.getAttribute('data-tooltip-stage') || '';
  tooltipBody.textContent = target.getAttribute('data-tooltip-body') || '';
  tooltipEl.classList.add('visible');
});

canvas.addEventListener('mousemove', (e) => {
  if (!tooltipEl.classList.contains('visible')) return;
  const pad = 16;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const rect = tooltipEl.getBoundingClientRect();
  if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - pad;
  if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - pad;
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
});

canvas.addEventListener('mouseout', (e) => {
  const target = e.target.closest('[data-tooltip]');
  if (!target) return;
  // Check if we moved to a child of the same tooltip target
  if (target.contains(e.relatedTarget)) return;
  tooltipEl.classList.remove('visible');
});

// ================================================================
// PAN & ZOOM
// ================================================================

let scale = 0.68;
let panX = 0;
let panY = 0;
let isPanning = false;
let panStartX, panStartY;

const container = document.getElementById('canvasContainer');

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  document.getElementById('zoomLevel').textContent = Math.round(scale * 100) + '%';
  updateMinimap();
}

// Mouse wheel zoom
container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.05 : 0.05;
  const newScale = Math.max(0.25, Math.min(2, scale + delta));

  // Zoom toward mouse position
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;

  applyTransform();
}, { passive: false });

// Pan
container.addEventListener('mousedown', (e) => {
  if (e.target.closest('.phase, .entry-node, .output-node, .wave-node, .ext-badge')) return;
  isPanning = true;
  panStartX = e.clientX - panX;
  panStartY = e.clientY - panY;
});

window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  panX = e.clientX - panStartX;
  panY = e.clientY - panStartY;
  applyTransform();
});

window.addEventListener('mouseup', () => { isPanning = false; });

// Zoom buttons
document.getElementById('zoomIn').addEventListener('click', () => {
  scale = Math.min(2, scale + 0.1);
  applyTransform();
});

document.getElementById('zoomOut').addEventListener('click', () => {
  scale = Math.max(0.25, scale - 0.1);
  applyTransform();
});

document.getElementById('resetView').addEventListener('click', () => {
  scale = 0.68;
  panX = 0;
  panY = 0;
  applyTransform();
  document.querySelectorAll('.phase.expanded').forEach(p => p.classList.remove('expanded'));
});

// ================================================================
// MINIMAP
// ================================================================

function renderMinimap() {
  const content = document.getElementById('minimapContent');
  // Clear existing dots
  content.querySelectorAll('.minimap-dot').forEach(d => d.remove());

  const canvasW = 2400;
  const canvasH = 1500;
  const mapW = 180;
  const mapH = 110;

  // Place dots for each phase
  PHASES.forEach(phase => {
    const pos = LAYOUT.phases[phase.id];
    const dot = document.createElement('div');
    dot.className = 'minimap-dot';
    dot.style.left = (pos.x / canvasW * mapW) + 'px';
    dot.style.top = (pos.y / canvasH * mapH) + 'px';
    dot.style.width = (pos.w / canvasW * mapW) + 'px';
    dot.style.height = '8px';
    dot.style.background = phase.colorAlpha(0.5);
    dot.style.borderRadius = '2px';
    content.appendChild(dot);
  });

  updateMinimap();
}

function updateMinimap() {
  const viewport = document.getElementById('minimapViewport');
  const containerRect = container.getBoundingClientRect();
  const canvasW = 2400;
  const canvasH = 1500;
  const mapW = 180;
  const mapH = 110;

  // Visible area in canvas coordinates
  const visX = -panX / scale;
  const visY = -panY / scale;
  const visW = containerRect.width / scale;
  const visH = containerRect.height / scale;

  viewport.style.left = (visX / canvasW * mapW) + 'px';
  viewport.style.top = (visY / canvasH * mapH) + 'px';
  viewport.style.width = Math.min(mapW, visW / canvasW * mapW) + 'px';
  viewport.style.height = Math.min(mapH, visH / canvasH * mapH) + 'px';
}

// ================================================================
// KEYBOARD SHORTCUTS
// ================================================================

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.phase.expanded').forEach(p => p.classList.remove('expanded'));
  }
  if (e.key === '+' || e.key === '=') {
    scale = Math.min(2, scale + 0.1);
    applyTransform();
  }
  if (e.key === '-') {
    scale = Math.max(0.25, scale - 0.1);
    applyTransform();
  }
  if (e.key === '0') {
    scale = 0.68;
    panX = 0;
    panY = 0;
    applyTransform();
  }
  // Number keys 1-7 expand corresponding phase
  const num = parseInt(e.key);
  if (num >= 1 && num <= 7) {
    const phaseIds = ['discovery', 'extraction', 'enrichment', 'analysis', 'intelligence', 'synthesis', 'output'];
    const targetPhase = document.getElementById(`phase-${phaseIds[num - 1]}`);
    if (targetPhase) {
      document.querySelectorAll('.phase.expanded').forEach(p => p.classList.remove('expanded'));
      targetPhase.classList.add('expanded');

      // Pan to center the phase
      const pos = LAYOUT.phases[phaseIds[num - 1]];
      const containerRect = container.getBoundingClientRect();
      panX = containerRect.width / 2 - (pos.x + pos.w / 2) * scale;
      panY = containerRect.height / 2 - (pos.y + 100) * scale;
      applyTransform();
    }
  }
});

// ================================================================
// INITIALIZATION
// ================================================================

document.addEventListener('DOMContentLoaded', () => {
  renderAll();
  applyTransform();

  // Auto-expand discovery on load after a moment
  setTimeout(() => {
    const disc = document.getElementById('phase-discovery');
    if (disc) disc.classList.add('expanded');
  }, 600);
});
</script>
